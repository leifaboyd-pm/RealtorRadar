<style>
:root{
  /* Partners Mortgage — coastal white refresh */
  --brand: #00818D;
  --brand-2: #006e78;
  --brand-3: #1ba3b0;
  --brand-soft: rgba(0,129,141,.07);
  --brand-tint: #e4f2f3;
  --brand-deep: #00424a;
  --gold: #FFAC27;
  --gold-2: #e89500;
  --gold-soft: rgba(255,172,39,.14);
  --gold-deep: #8a5c00;
  --navy: #0a2230;
  --navy-2: #143b52;
  --cream: #f2f6f6;
  --cream-2: #e7eef0;
  --paper: #ffffff;
  --ink: #12242c;
  --ink-2: #3b4a51;
  --muted: #69757b;
  --muted-2: #9ba6ab;
  --rule: rgba(12,38,46,.07);
  --rule-strong: rgba(12,38,46,.14);
  --shadow-sm: 0 1px 2px rgba(12,38,46,.04), 0 1px 3px rgba(12,38,46,.05);
  --shadow: 0 2px 8px rgba(12,38,46,.05), 0 12px 28px rgba(12,38,46,.07);
  --shadow-lg: 0 6px 20px rgba(12,38,46,.08), 0 30px 60px rgba(12,38,46,.12);
  --serif: 'Lora', Georgia, serif;
  --sans: 'Barlow', system-ui, -apple-system, sans-serif;
  --cond: 'Barlow Condensed', 'Barlow', sans-serif;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);
  font-size:14.5px;
  line-height:1.5;
  color:var(--ink);
  background:linear-gradient(178deg,#fafdfd 0%,var(--cream) 44%,#e9f1f2 100%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  min-height:100vh;
}

button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
a{color:var(--brand);text-decoration:none}
a:hover{color:var(--brand-2)}

/* === LAYOUT === */
#app{min-height:100vh;display:flex;flex-direction:column}

.topbar{
  background:var(--navy);
  color:#fff;
  padding:14px 28px;
  display:flex;
  align-items:center;
  gap:24px;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:sticky;top:0;z-index:100;
}
.topbar .brand{display:flex;align-items:center;gap:14px;cursor:pointer}
.topbar .brand-mark{width:38px;height:38px;flex-shrink:0;position:relative}
.topbar .brand-mark svg{width:100%;height:100%}
.topbar .brand-text{display:flex;flex-direction:column;line-height:1.05}
.topbar .brand-text .name{font-family:var(--serif);font-style:italic;font-weight:600;font-size:18px;letter-spacing:.2px}
.topbar .brand-text .name b{font-style:normal;color:var(--gold)}
.topbar .brand-text .sub{font-family:var(--cond);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:2px}

.topbar nav{display:flex;gap:2px;margin-left:32px}
.topbar nav button{
  padding:9px 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  color:rgba(255,255,255,.65);
  letter-spacing:.2px;
  transition:all .15s;
  display:flex;align-items:center;gap:7px;
}
.topbar nav button:hover{color:#fff;background:rgba(255,255,255,.06)}
.topbar nav button.active{color:#fff;background:rgba(0,129,141,.32);box-shadow:inset 0 -2px 0 var(--brand-3)}
.topbar nav button .nav-count{
  font-size:10.5px;font-weight:600;background:rgba(255,255,255,.14);
  padding:1px 6px;border-radius:8px;letter-spacing:.5px;
}

.topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar .right .ai-status{
  font-family:var(--cond);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:7px;cursor:pointer;
  transition:all .15s;
}
.topbar .right .ai-status:hover{background:rgba(255,255,255,.06)}
.topbar .right .ai-status .dot{width:7px;height:7px;border-radius:50%;background:#ef5350}
.topbar .right .ai-status.live .dot{background:#4caf50;box-shadow:0 0 0 0 rgba(76,175,80,.7);animation:pulse 2s infinite}
.topbar .right .ai-status.mock .dot{background:var(--gold)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.7)}50%{box-shadow:0 0 0 8px rgba(76,175,80,0)}}

.topbar .right .icon-btn{
  width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;transition:all .15s;color:#fff;
}
.topbar .right .icon-btn:hover{background:rgba(255,255,255,.12)}

.main{flex:1;display:flex;flex-direction:column;min-height:0}

/* === RADAR LOGO PLACEHOLDER === */
.radar-logo{position:relative;width:100%;height:100%}
.radar-logo .ring{position:absolute;inset:0;border:1.5px solid var(--brand-3);border-radius:50%;opacity:.5}
.radar-logo .ring-2{position:absolute;inset:5px;border:1px solid var(--gold);border-radius:50%;opacity:.35}
.radar-logo .sweep{
  position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(0,129,141,.4) 60deg,transparent 60deg);
  animation:sweep 4s linear infinite;
}
@keyframes sweep{to{transform:rotate(360deg)}}
.radar-logo .core{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 0 2px rgba(255,172,39,.25);
}
.radar-logo .blip{
  position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;
  box-shadow:0 0 6px var(--gold);opacity:.85;
}
.radar-logo .blip-1{top:22%;left:64%}
.radar-logo .blip-2{top:68%;left:30%}
.radar-logo .blip-3{top:36%;left:18%}

/* === PAGE WRAPPER === */
.page{flex:1;padding:32px 36px 80px;max-width:1600px;margin:0 auto;width:100%}
.page-hero{margin-bottom:36px;display:flex;align-items:flex-end;justify-content:space-between;gap:32px}
.page-hero .titles{flex:1;min-width:0}
.page-hero .eyebrow{
  font-family:var(--cond);font-size:11.5px;letter-spacing:2.2px;text-transform:uppercase;
  color:var(--brand);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.page-hero .eyebrow::before{content:"";width:24px;height:1.5px;background:var(--brand)}
.page-hero h1{
  font-family:var(--serif);font-weight:600;font-size:42px;line-height:1.05;letter-spacing:-.8px;
  margin:0;color:var(--navy);
}
.page-hero h1 em{color:var(--brand);font-style:italic;font-weight:600}
.page-hero h1 .gold{color:var(--gold-deep)}
.page-hero .lede{font-family:var(--serif);font-size:17px;line-height:1.55;color:var(--muted);margin-top:14px;max-width:680px;font-style:italic}

.page-hero .stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:20px;
  flex-shrink:0;
}
.page-hero .stat{text-align:left;padding-left:18px;border-left:2px solid var(--rule-strong)}
.page-hero .stat.alert{border-left-color:var(--gold)}
.page-hero .stat .n{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--navy);line-height:1;letter-spacing:-.5px}
.page-hero .stat .n.alert{color:var(--gold-deep)}
.page-hero .stat .lab{font-family:var(--cond);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-top:7px}

/* === BUTTONS === */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;
  font-size:13.5px;font-weight:500;font-family:var(--sans);
  border-radius:8px;transition:all .15s;cursor:pointer;
  border:1px solid transparent;line-height:1;letter-spacing:.1px;
}
.btn-primary{background:var(--brand);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--brand-2);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-secondary{background:#fff;color:var(--ink);border-color:var(--rule-strong)}
.btn-secondary:hover{background:var(--brand-tint);border-color:var(--brand)}
.btn-ghost{color:var(--muted);padding:8px 12px}
.btn-ghost:hover{color:var(--brand);background:var(--brand-soft)}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:600;box-shadow:var(--shadow-sm)}
.btn-gold:hover{background:var(--gold-2);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-danger{background:#fff;color:#c62828;border-color:rgba(198,40,40,.3)}
.btn-danger:hover{background:rgba(198,40,40,.06)}
.btn-sm{padding:7px 12px;font-size:12.5px}
.btn-lg{padding:14px 24px;font-size:14.5px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* === KANBAN === */
.kanban-wrap{margin-top:8px}
.kanban-legend{
  font-family:var(--cond);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;
}
.kanban-legend span.zone{padding:3px 10px;border-radius:12px;font-weight:600}
.kanban-legend .zone-cold{background:#e8eef2;color:#4a6478}
.kanban-legend .zone-active{background:var(--brand-tint);color:var(--brand-2)}
.kanban-legend .zone-partner{background:var(--gold-soft);color:var(--gold-deep)}
.kanban-legend .zone-dormant{background:#f0e8e8;color:#8a5555}

.kanban{
  display:flex;gap:14px;overflow-x:auto;padding-bottom:24px;
  scroll-snap-type:x mandatory;
}
.kanban::-webkit-scrollbar{height:10px}
.kanban::-webkit-scrollbar-track{background:transparent}
.kanban::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:5px}

.col{
  flex:0 0 280px;background:var(--paper);border-radius:14px;padding:14px 12px;
  display:flex;flex-direction:column;min-height:280px;max-height:calc(100vh - 280px);
  scroll-snap-align:start;border:1px solid var(--rule);
}
.col-zone-cold{border-top:3px solid #8aa3b5}
.col-zone-active{border-top:3px solid var(--brand)}
.col-zone-partner{border-top:3px solid var(--gold)}
.col-zone-dormant{border-top:3px solid #b59090;opacity:.85}

.col-head{padding:4px 8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-head .name{font-family:var(--cond);font-size:12.5px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-2)}
.col-head .count{
  font-size:11px;font-weight:600;background:var(--rule);color:var(--muted);
  padding:2px 8px;border-radius:10px;
}
.col-body{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;padding:0 2px 8px}
.col-body::-webkit-scrollbar{width:5px}
.col-body::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:3px}
.col-empty{
  text-align:center;padding:24px 12px;color:var(--muted-2);font-size:12px;
  border:1px dashed var(--rule-strong);border-radius:10px;margin:8px 4px;
}

.agent-card{
  background:#fff;border-radius:10px;padding:12px 12px 11px;
  border:1px solid var(--rule);cursor:pointer;transition:all .15s;
  position:relative;
}
.agent-card:hover{border-color:var(--brand);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.agent-card .row1{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.agent-card .row1 .name{
  flex:1;font-weight:600;font-size:13.5px;color:var(--ink);line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.agent-card .tier{
  font-family:var(--cond);font-size:9.5px;font-weight:700;letter-spacing:1px;
  padding:2px 6px;border-radius:4px;line-height:1;flex-shrink:0;
}
.tier-A{background:var(--gold);color:var(--navy)}
.tier-B{background:var(--brand);color:#fff}
.tier-C{background:var(--rule-strong);color:var(--ink-2)}
.tier-LUX{background:var(--navy);color:var(--gold)}
.agent-card .brokerage{font-size:11.5px;color:var(--muted);line-height:1.3;margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-card .flags{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap}
.agent-card .flag{
  font-family:var(--cond);font-size:9.5px;letter-spacing:1px;font-weight:600;
  padding:2px 7px;border-radius:10px;text-transform:uppercase;line-height:1.3;
}
.flag-listing{background:var(--gold-soft);color:var(--gold-deep)}
.flag-buyer{background:var(--brand-soft);color:var(--brand-2)}
.flag-luxe{background:rgba(10,31,46,.07);color:var(--navy)}

.agent-card .next{
  background:var(--brand-tint);border-radius:7px;padding:7px 9px;
  font-size:11.5px;line-height:1.35;display:flex;gap:8px;align-items:flex-start;
}
.agent-card .next.overdue{background:rgba(255,172,39,.16)}
.agent-card .next.overdue .due{color:var(--gold-deep);font-weight:600}
.agent-card .next .due{
  font-family:var(--cond);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  font-weight:600;color:var(--brand-2);flex-shrink:0;line-height:1.4;padding-top:1px;
}
.agent-card .next .action{color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.agent-card .next-empty{font-size:11px;color:var(--muted-2);font-style:italic;padding:5px 0}

.agent-card .corner-badge{
  position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;
  background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);
}

/* === INSIGHT CARDS === */
.insight{
  background:linear-gradient(135deg,#fffbf0,var(--paper));
  border:1px solid var(--gold);
  border-left:4px solid var(--gold);
  border-radius:10px;padding:14px 18px;
  display:flex;gap:14px;align-items:flex-start;
  position:relative;
  margin:16px 0;
}
.insight .bulb{
  font-family:var(--cond);font-size:9.5px;font-weight:700;letter-spacing:1.4px;
  background:var(--gold);color:var(--navy);padding:3px 8px;border-radius:4px;
  flex-shrink:0;line-height:1.2;margin-top:1px;
}
.insight .body{flex:1;font-size:13px;line-height:1.55;color:var(--ink-2)}
.insight .body b{color:var(--navy);font-weight:600}
.insight .body em{font-style:italic;color:var(--muted);font-size:11.5px;display:block;margin-top:4px}
.insight .close-x{
  position:absolute;top:8px;right:10px;background:none;border:0;color:var(--muted-2);
  font-size:18px;line-height:1;cursor:pointer;padding:4px;
}
.insight .close-x:hover{color:var(--ink)}
.insight-inline{padding:8px 12px;margin:8px 0;font-size:12px}
.insight-inline .bulb{font-size:8.5px;padding:2px 6px}
.insight-inline .body{font-size:12px;line-height:1.5}

/* === MODALS === */
.modal-shade{
  position:fixed;inset:0;background:rgba(10,31,46,.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
  animation:fadeIn .15s ease-out;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--paper);border-radius:14px;max-width:640px;width:100%;
  max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);
  animation:modalIn .2s ease-out;
}
.modal.lg{max-width:880px}
.modal.xl{max-width:1100px}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{
  padding:22px 28px 16px;border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;gap:20px;
}
.modal-head .title{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--navy);line-height:1.2}
.modal-head .title em{color:var(--brand);font-style:italic}
.modal-head .close{
  width:32px;height:32px;border-radius:50%;background:var(--rule);
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  flex-shrink:0;font-size:18px;line-height:1;
}
.modal-head .close:hover{background:var(--rule-strong);color:var(--ink)}
.modal-body{padding:22px 28px}
.modal-foot{
  padding:16px 28px;border-top:1px solid var(--rule);
  display:flex;justify-content:flex-end;gap:10px;background:var(--cream);
  border-bottom-left-radius:14px;border-bottom-right-radius:14px;
}

/* === FORMS === */
.field{margin-bottom:18px}
.field label,.flbl{
  display:block;font-family:var(--cond);font-size:11.5px;letter-spacing:1.4px;
  text-transform:uppercase;font-weight:600;color:var(--ink-2);margin-bottom:7px;
}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4}
.field input[type="text"],.field input[type="email"],.field input[type="tel"],.field input[type="url"],
.field input[type="number"],.field input[type="password"],.field textarea,.field select,
input.fi,textarea.fi,select.fi{
  width:100%;padding:10px 13px;border:1px solid var(--rule-strong);
  border-radius:8px;background:#fff;font-size:13.5px;transition:all .15s;font-family:var(--sans);
}
.field input:focus,.field textarea:focus,.field select:focus,.fi:focus{
  outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);
}
.field textarea{resize:vertical;min-height:88px;line-height:1.55}
.field .row{display:flex;gap:12px}
.field .row > *{flex:1}

.chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.chip{
  padding:6px 13px;border-radius:18px;background:#fff;border:1px solid var(--rule-strong);
  font-size:12.5px;cursor:pointer;transition:all .12s;font-weight:500;
}
.chip:hover{border-color:var(--brand)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.chip.gold.on{background:var(--gold);color:var(--navy);border-color:var(--gold)}

/* === AGENT DETAIL === */
.detail-head{
  display:flex;align-items:flex-start;gap:24px;
  padding:28px 32px 24px;background:var(--paper);
  border-radius:14px;border:1px solid var(--rule);
  margin-bottom:24px;
}
.detail-head .avatar{
  width:64px;height:64px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,var(--brand),var(--brand-deep));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:24px;font-weight:600;
}
.detail-head .meta{flex:1;min-width:0}
.detail-head .name-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.detail-head h1{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--navy);margin:0;line-height:1.15;letter-spacing:-.3px}
.detail-head .brokerage{color:var(--muted);font-size:14px;margin-top:3px}
.detail-head .badges{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
.detail-head .actions{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}

.detail-stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;
  margin-top:14px;padding-top:14px;border-top:1px solid var(--rule);
}
.detail-stats .ds{padding-right:18px;border-right:1px solid var(--rule)}
.detail-stats .ds:last-child{border-right:0;padding-right:0}
.detail-stats .ds .v{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--navy);line-height:1.1}
.detail-stats .ds .v.dim{color:var(--muted-2)}
.detail-stats .ds .l{font-family:var(--cond);font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-top:3px}

.tabs{
  display:flex;gap:2px;border-bottom:1px solid var(--rule);margin-bottom:24px;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tabs button{
  padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .15s;display:flex;align-items:center;gap:6px;flex-shrink:0;
  font-family:var(--sans);letter-spacing:.2px;
}
.tabs button:hover{color:var(--ink)}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.tabs button .badge{
  font-size:10px;background:var(--rule);color:var(--muted);
  padding:1px 6px;border-radius:8px;font-weight:600;
}
.tabs button.active .badge{background:var(--brand-soft);color:var(--brand)}

/* === CARDS / PANELS === */
.panel{
  background:var(--paper);border-radius:12px;border:1px solid var(--rule);
  padding:22px 24px;margin-bottom:20px;
}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:16px}
.panel-title{
  font-family:var(--serif);font-size:17px;font-weight:600;color:var(--navy);
  display:flex;align-items:center;gap:10px;
}
.panel-title .ico{color:var(--brand)}
.panel-eyebrow{
  font-family:var(--cond);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--brand);font-weight:600;margin-bottom:6px;
}
.panel.gold{border-left:3px solid var(--gold)}
.panel.teal{border-left:3px solid var(--brand)}

.empty-state{
  text-align:center;padding:48px 28px;color:var(--muted);
}
.empty-state .ico{font-size:38px;margin-bottom:14px;opacity:.4}
.empty-state h3{font-family:var(--serif);font-size:20px;color:var(--ink-2);margin:0 0 8px;font-weight:600}
.empty-state p{font-size:13.5px;margin:0 0 18px;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.55}

/* === CADENCE STEPS === */
.cadence-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:var(--brand-tint);border-radius:10px;
  margin-bottom:18px;gap:14px;
}
.cadence-head .ph{flex:1;min-width:0}
.cadence-head .label{font-family:var(--cond);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--brand-2);font-weight:600;margin-bottom:4px}
.cadence-head .name{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--navy);line-height:1.2}
.cadence-head .name em{font-style:italic;color:var(--brand)}

.switch-banner{
  background:linear-gradient(135deg,#fffbf0,var(--gold-soft));
  border:1px solid var(--gold);border-left:4px solid var(--gold);
  border-radius:10px;padding:14px 18px;margin-bottom:18px;
  display:flex;align-items:center;gap:16px;
}
.switch-banner .body{flex:1;font-size:13.5px}
.switch-banner .body b{color:var(--navy);font-weight:600}

.step{
  display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--rule);align-items:flex-start;
}
.step:last-child{border-bottom:0}
.step.done{opacity:.65}
.step.due{background:linear-gradient(90deg,var(--gold-soft),transparent);margin-left:-12px;padding-left:12px;border-radius:8px}
.step .check{
  width:24px;height:24px;border:2px solid var(--rule-strong);border-radius:50%;
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  margin-top:1px;transition:all .15s;background:#fff;color:transparent;
}
.step .check:hover{border-color:var(--brand)}
.step.done .check{background:var(--brand);border-color:var(--brand);color:#fff}
.step .body{flex:1;min-width:0}
.step .meta{
  font-family:var(--cond);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.step .meta .day{color:var(--brand);font-weight:600}
.step .meta .channel{
  background:var(--rule);padding:2px 7px;border-radius:4px;font-weight:600;color:var(--ink-2);
}
.step.due .meta .day{color:var(--gold-deep)}
.step .meta .opt{font-style:italic;color:var(--muted-2)}
.step .action-name{font-weight:600;color:var(--ink);font-size:14px;margin-bottom:3px;line-height:1.3}
.step .prompt{font-size:13px;color:var(--muted);line-height:1.5}
.step .tasks{margin-top:8px;font-size:12.5px;color:var(--ink-2)}
.step .tasks li{margin:3px 0;line-height:1.45}
.step .step-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* === MESSAGE DRAFT === */
.draft-grid{display:grid;grid-template-columns:280px 1fr;gap:24px}
@media (max-width:900px){.draft-grid{grid-template-columns:1fr}}
.draft-controls{display:flex;flex-direction:column;gap:14px}
.draft-output{display:flex;flex-direction:column;gap:14px;min-height:200px}
.variant{
  background:#fff;border:1px solid var(--rule);border-radius:10px;padding:14px 16px;
}
.variant-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
  font-family:var(--cond);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--brand);font-weight:600;
}
.variant-text{
  font-size:13.5px;line-height:1.6;color:var(--ink-2);white-space:pre-wrap;
  font-family:var(--sans);
}
.variant .copy-row{display:flex;gap:6px;margin-top:11px;padding-top:11px;border-top:1px solid var(--rule)}

/* === DELIVERABLES === */
.deliv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
@media (max-width:900px){.deliv-grid{grid-template-columns:1fr}}
.deliv-tile{
  padding:22px 22px 20px;background:#fff;border:1px solid var(--rule);
  border-radius:12px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;
}
.deliv-tile::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brand);
}
.deliv-tile:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow)}
.deliv-tile.gold::before{background:var(--gold)}
.deliv-tile.navy::before{background:var(--navy)}
.deliv-tile .deliv-eyebrow{
  font-family:var(--cond);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);font-weight:600;margin-bottom:8px;
}
.deliv-tile h3{font-family:var(--serif);font-size:18px;color:var(--navy);margin:0 0 7px;font-weight:600;line-height:1.25}
.deliv-tile p{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0 0 14px}
.deliv-tile .deliv-cta{
  font-family:var(--cond);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--brand);font-weight:600;display:flex;align-items:center;gap:7px;
}

/* === RESEARCH DOSSIER === */
.dossier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.dossier-card{background:#fff;border:1px solid var(--rule);border-radius:10px;padding:16px 18px}
.dossier-card h4{
  font-family:var(--cond);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--brand);font-weight:600;margin:0 0 10px;
}
.dossier-card ul{margin:0;padding-left:18px;font-size:13px;line-height:1.55;color:var(--ink-2)}
.dossier-card li{margin:5px 0}
.dossier-card p{margin:0 0 8px;font-size:13px;line-height:1.55;color:var(--ink-2)}
.dossier-card.warn{border-left:3px solid #d97706;background:#fffaf0}
.dossier-card.warn h4{color:#a16207}

/* === RESEARCH TAB — readable, LO-focused === */
.rx-glance{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.rx-cell{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-sm)}
.rx-cell .k{font-family:var(--cond);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
.rx-cell .v{font-size:13.5px;line-height:1.5;color:var(--ink-2)}
.rx-card{background:var(--paper);border:1px solid var(--rule);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.rx-h{display:flex;align-items:center;gap:9px;font-family:var(--cond);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brand);font-weight:700;margin-bottom:14px}
.rx-h .rx-ic-h{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;background:var(--brand-tint);color:var(--brand);font-size:12px}
.rx-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:680px){.rx-grid{grid-template-columns:1fr}}
.rx-grid .rx-card{margin-bottom:0}
.rx-links{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.rx-links{grid-template-columns:1fr}}
.rx-link{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--rule);border-radius:11px;background:var(--cream);text-decoration:none;transition:all .14s}
.rx-link:hover{border-color:var(--brand);background:var(--brand-soft);transform:translateY(-1px)}
.rx-link .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;background:var(--navy);color:#fff}
.rx-link.rx-ig .ic{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)}
.rx-link.rx-li .ic{background:#0a66c2}
.rx-link.rx-web .ic{background:var(--brand)}
.rx-link.rx-phone .ic{background:var(--gold-2)}
.rx-link.rx-email .ic{background:var(--brand-deep)}
.rx-link .tx{flex:1;min-width:0}
.rx-link .tx .nm{display:block;font-size:13px;font-weight:600;color:var(--navy);line-height:1.2}
.rx-link .tx .hd{display:block;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rx-link .go{color:var(--muted-2);font-size:18px;flex-shrink:0;line-height:1}
.rx-link:hover .go{color:var(--brand)}
.rx-empty-note{font-size:13px;color:var(--muted);line-height:1.55;font-style:italic}
.rx-social-notes{margin-top:14px;border-top:1px solid var(--rule);padding-top:12px}
.rx-social-notes .lbl{font-family:var(--cond);font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.rx-social-notes ul{margin:0;padding-left:16px;font-size:12.5px;color:var(--ink-2);line-height:1.5}
.rx-social-notes li{margin:3px 0}
.rx-hero{background:linear-gradient(135deg,var(--brand-tint),var(--paper));border-color:var(--brand-3)}
.rx-hooks{display:flex;flex-direction:column;gap:11px}
.rx-hook{display:flex;gap:11px;align-items:flex-start;font-size:14px;line-height:1.55;color:var(--ink)}
.rx-hook .dot{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:var(--brand);margin-top:6px}
.rx-list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:9px}
.rx-list li{position:relative;padding-left:24px;font-size:13.5px;line-height:1.55;color:var(--ink-2)}
.rx-list.arrow li::before{content:'\2192';position:absolute;left:0;top:0;color:var(--brand);font-weight:700}
.rx-list.check li::before{content:'\2713';position:absolute;left:0;top:0;color:var(--brand);font-weight:700}
.rx-list.no li::before{content:'\2717';position:absolute;left:0;top:0;color:#c0392b;font-weight:700}
.rx-warn{background:#fffaf3;border-color:#f0d9a8}
.rx-warn .rx-h{color:#a16207}
.rx-warn .rx-h .rx-ic-h{background:var(--gold-soft);color:var(--gold-deep)}
.rx-stamp{font-size:11px;color:var(--muted-2);margin-top:8px;text-align:right;font-family:var(--cond);letter-spacing:1.2px;text-transform:uppercase}

/* === Completion notifications (top-right) === */
#notify-mount{position:fixed;top:16px;right:16px;z-index:1200;display:flex;flex-direction:column;gap:10px;max-width:330px}
.rr-notify{display:flex;align-items:flex-start;gap:11px;background:#fff;border:1px solid var(--rule);border-left:3px solid var(--brand);border-radius:12px;box-shadow:var(--shadow-lg);padding:13px 15px;cursor:pointer;animation:rrNoteIn .28s cubic-bezier(.2,.7,.3,1);transition:opacity .25s ease,transform .25s ease}
.rr-notify .ico{width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.rr-notify .tx{flex:1;min-width:0}
.rr-notify .tt{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.rr-notify .sb{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.rr-notify .x{color:var(--muted-2);font-size:15px;line-height:1;flex-shrink:0}
@keyframes rrNoteIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}

/* === NUDGES === */
.nudge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.nudge-card{
  background:var(--paper);border:1px solid var(--rule);border-radius:12px;
  padding:18px 20px;transition:all .15s;cursor:pointer;position:relative;
}
.nudge-card:hover{border-color:var(--brand);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.nudge-card .eyebrow{
  font-family:var(--cond);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;
  font-weight:600;color:var(--brand);margin-bottom:6px;
}
.nudge-card h4{font-family:var(--serif);font-size:16px;color:var(--navy);margin:0 0 7px;font-weight:600;line-height:1.25}
.nudge-card .desc{font-size:12.5px;color:var(--muted);line-height:1.5;margin:0 0 12px}
.nudge-card .meta-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--muted-2);
}
.nudge-card .ch{
  font-family:var(--cond);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;
}

/* === VALUE MENU === */
.value-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.value-item{
  display:flex;align-items:flex-start;gap:11px;padding:12px 14px;
  background:#fff;border:1px solid var(--rule);border-radius:9px;cursor:pointer;
  transition:all .12s;
}
.value-item:hover{border-color:var(--brand)}
.value-item.on{background:var(--brand-tint);border-color:var(--brand)}
.value-item .vchk{
  width:18px;height:18px;border:2px solid var(--rule-strong);border-radius:5px;
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:12px;font-weight:700;background:#fff;
}
.value-item.on .vchk{background:var(--brand);border-color:var(--brand);color:#fff}
.value-item .vbody{flex:1;min-width:0}
.value-item .vname{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3}
.value-item .vdesc{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}
.value-item .vrespa{
  display:inline-block;font-family:var(--cond);font-size:9px;letter-spacing:1.2px;
  background:rgba(76,175,80,.12);color:#2e7d32;padding:1px 6px;border-radius:3px;
  font-weight:600;margin-top:5px;
}
.value-item .vrespa.warn{background:rgba(217,119,6,.12);color:#a16207}

/* === SETTINGS === */
.set-grid{display:grid;grid-template-columns:240px 1fr;gap:32px}
@media (max-width:900px){.set-grid{grid-template-columns:1fr}}
.set-side .set-nav{display:flex;flex-direction:column;gap:2px}
.set-side .set-nav button{
  text-align:left;padding:11px 16px;border-radius:8px;font-size:13.5px;color:var(--muted);
  font-weight:500;transition:all .12s;display:flex;align-items:center;gap:9px;
}
.set-side .set-nav button:hover{color:var(--ink);background:var(--brand-soft)}
.set-side .set-nav button.active{background:var(--brand);color:#fff;font-weight:600}

/* === PLAYBOOK === */
.playbook-cad{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--rule)}
.playbook-cad:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
.playbook-cad h2{
  font-family:var(--serif);font-size:22px;font-weight:600;color:var(--navy);
  margin:0 0 6px;letter-spacing:-.2px;
}
.playbook-cad h2 em{color:var(--brand)}
.playbook-cad .sub{font-style:italic;font-family:var(--serif);color:var(--muted);font-size:14px;margin-bottom:18px}

.pb-step{
  display:flex;gap:18px;padding:14px 0;border-bottom:1px solid var(--rule);align-items:flex-start;
}
.pb-step:last-child{border-bottom:0}
.pb-step .day-dot{
  flex-shrink:0;width:54px;text-align:center;
}
.pb-step .day-dot .num{
  font-family:var(--serif);font-size:24px;font-weight:600;color:var(--brand);line-height:1;letter-spacing:-.5px;
}
.pb-step .day-dot .lab{
  font-family:var(--cond);font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--muted);margin-top:3px;
}
.pb-step .pb-body{flex:1;min-width:0}
.pb-step .pb-meta{font-family:var(--cond);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:flex;gap:10px;flex-wrap:wrap}
.pb-step .pb-meta .channel{background:var(--rule);padding:2px 7px;border-radius:4px;color:var(--ink-2);font-weight:600}
.pb-step .pb-name{font-weight:600;color:var(--ink);font-size:15px;margin-bottom:4px;line-height:1.3}
.pb-step .pb-prompt{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:6px}
.pb-step .pb-insight{
  background:var(--gold-soft);border-left:3px solid var(--gold);padding:9px 13px;border-radius:6px;
  font-size:12px;color:var(--ink-2);line-height:1.5;margin-top:8px;
}
.pb-step .pb-insight b{color:var(--navy)}
.pb-step .pb-insight em{color:var(--muted);font-size:11px;font-style:italic;display:block;margin-top:3px}

/* === ONBOARDING === */
.onb-shade{position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;align-items:center;justify-content:center;padding:30px;overflow-y:auto}
.onb{max-width:680px;width:100%;text-align:center;padding:40px 20px}
.onb .eyebrow{
  font-family:var(--cond);font-size:11.5px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--brand);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:12px;justify-content:center;
}
.onb .eyebrow::before,.onb .eyebrow::after{content:"";width:36px;height:1.5px;background:var(--brand)}
.onb h1{font-family:var(--serif);font-size:54px;font-weight:600;line-height:1.05;color:var(--navy);margin:0 0 16px;letter-spacing:-1.2px}
.onb h1 em{color:var(--brand)}
.onb h1 .gold{color:var(--gold-deep);font-style:italic}
.onb .lede{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--muted);line-height:1.55;margin:0 auto 36px;max-width:520px}
.onb .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;text-align:left}
@media (max-width:680px){.onb .steps{grid-template-columns:1fr}}
.onb .step{
  background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:18px 20px;
}
.onb .step .n{
  font-family:var(--serif);font-size:32px;font-weight:600;color:var(--brand);line-height:1;
}
.onb .step h4{font-family:var(--serif);font-size:16px;color:var(--navy);margin:6px 0 6px;font-weight:600}
.onb .step p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.5}
.onb .you-matter{
  font-family:var(--serif);font-style:italic;font-size:14px;color:var(--brand-2);
  margin-top:36px;letter-spacing:.3px;
}
.onb .you-matter::before{content:"❝ ";color:var(--gold);font-style:normal;font-size:18px}
.onb .you-matter::after{content:" ❞";color:var(--gold);font-style:normal;font-size:18px}

/* === MISC === */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--navy);color:#fff;padding:13px 22px;border-radius:24px;
  font-size:13px;z-index:2000;box-shadow:var(--shadow-lg);
  animation:toastIn .25s ease-out;
  display:flex;align-items:center;gap:10px;
}
.toast.success{background:#2e7d32}
.toast.error{background:#c62828}
.toast.gold{background:var(--gold);color:var(--navy);font-weight:600}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

.spinner{
  display:inline-block;width:14px;height:14px;border:2px solid currentColor;
  border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.tag{
  font-family:var(--cond);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;font-weight:600;line-height:1.3;display:inline-block;
}
.tag-teal{background:var(--brand-soft);color:var(--brand-2)}
.tag-gold{background:var(--gold-soft);color:var(--gold-deep)}
.tag-navy{background:rgba(10,31,46,.08);color:var(--navy)}
.tag-muted{background:var(--rule);color:var(--muted)}

.divider{height:1px;background:var(--rule);margin:24px 0}
.kv-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--rule);font-size:13px;gap:14px}
.kv-row:last-child{border-bottom:0}
.kv-row .k{color:var(--muted);font-family:var(--cond);letter-spacing:1px;text-transform:uppercase;font-size:11px;font-weight:600;flex-shrink:0;padding-top:2px}
.kv-row .v{color:var(--ink);text-align:right;flex:1;min-width:0;word-break:break-word}

.list-view{background:var(--paper);border-radius:12px;border:1px solid var(--rule);overflow:hidden}
.list-view table{width:100%;border-collapse:collapse}
.list-view th{
  font-family:var(--cond);font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;
  text-align:left;padding:13px 16px;background:var(--cream);color:var(--ink-2);font-weight:600;
  border-bottom:1px solid var(--rule);
}
.list-view td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--rule);vertical-align:middle}
.list-view tr:last-child td{border-bottom:0}
.list-view tr.row:hover td{background:var(--brand-soft);cursor:pointer}
.list-view td.right{text-align:right}

.searchbox{position:relative;flex:1;max-width:380px}
.searchbox input{
  width:100%;padding:10px 14px 10px 38px;border:1px solid var(--rule-strong);
  border-radius:24px;background:#fff;font-size:13.5px;
}
.searchbox::before{
  content:"⚲";position:absolute;left:14px;top:50%;transform:translateY(-50%) rotate(45deg);
  color:var(--muted);font-size:15px;pointer-events:none;
}
.searchbox input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}

/* === ICONS (inline SVG) === */
.ico{display:inline-block;width:16px;height:16px;vertical-align:middle;line-height:1}
.ico svg{width:100%;height:100%;fill:currentColor;display:block}

/* === SCROLLBAR === */
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:4px}
*::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}

/* === RESEARCH LOADING (radar pulse) === */
.research-loading{padding:48px 30px;text-align:center}
.research-loading h3{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--navy);margin:18px 0 4px;line-height:1.2}
.research-loading h3 em{color:var(--brand);font-style:italic}
.research-loading .phase-text{
  font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:14.5px;
  margin-top:14px;min-height:22px;line-height:1.4;
  transition:opacity .4s;
}
.research-loading .progress-bar{
  width:240px;height:3px;background:var(--rule);border-radius:2px;overflow:hidden;
  margin:22px auto 14px;position:relative;
}
.research-loading .progress-bar .fill{
  position:absolute;left:0;top:0;bottom:0;width:30%;
  background:linear-gradient(90deg,var(--brand),var(--gold),var(--brand));
  background-size:200% 100%;border-radius:2px;
  animation:progressSlide 2.2s ease-in-out infinite, progressShift 3s linear infinite;
}
@keyframes progressSlide{
  0%{left:-30%}
  100%{left:100%}
}
@keyframes progressShift{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}
.research-loading .meta{
  font-family:var(--cond);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--muted);display:flex;justify-content:center;gap:10px;align-items:center;
}
.research-loading .meta .elapsed{color:var(--brand);font-weight:600}

.radar-pulse{position:relative;width:88px;height:88px;margin:0 auto;display:flex;align-items:center;justify-content:center}
.radar-pulse .ring-pulse{
  position:absolute;inset:0;border-radius:50%;border:2px solid var(--brand);opacity:0;
  animation:radarPulse 2.6s ease-out infinite;
}
.radar-pulse .ring-pulse-2{animation-delay:1.3s}
.radar-pulse .ring-pulse-3{animation-delay:.65s;border-color:var(--gold);opacity:0;border-width:1.5px}
@keyframes radarPulse{
  0%{transform:scale(.25);opacity:.95}
  100%{transform:scale(1);opacity:0}
}
.radar-pulse .pulse-core{
  width:14px;height:14px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 0 4px rgba(255,172,39,.22);
  animation:pulseCore 1.6s ease-in-out infinite;
  z-index:1;
}
@keyframes pulseCore{
  0%,100%{transform:scale(1);box-shadow:0 0 0 4px rgba(255,172,39,.22)}
  50%{transform:scale(1.15);box-shadow:0 0 0 8px rgba(255,172,39,.10)}
}

/* === DELIVERABLE EDITORIAL VIEWER (Ruby-quality treatment) === */
/* Scoped under .deliv-view to avoid polluting the app shell */

.deliv-view{
  --b-teal:#00818D;
  --b-teal-dark:#006570;
  --b-teal-deep:#003d44;
  --b-teal-light:#E6F2F3;
  --b-warm:#6e7a80;
  --b-warm-light:#eef3f4;
  --b-warm-deep:#3a4a52;
  --b-cream:#f4f7f8;
  --b-cream-deep:#e9eff1;
  --b-gold:#FFAC27;
  --b-gold-soft:#FFF4DC;
  --b-gold-mid:#FFD78A;
  --b-ink:#14242c;
  --b-ink-muted:#5a676c;
  --b-line:#e2e8ea;
  --b-paper:#ffffff;

  position:fixed;inset:0;background:var(--b-cream);z-index:990;
  overflow-y:auto;overflow-x:hidden;
  font-family:'Barlow','Montserrat',system-ui,sans-serif;
  color:var(--b-ink);line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

/* Floating action bar */
.deliv-view .deliv-actions{
  position:sticky;top:0;z-index:5;
  background:rgba(251,247,241,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--b-line);
  padding:14px clamp(20px,4vw,40px);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.deliv-view .deliv-actions .left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.deliv-view .deliv-actions .right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.deliv-view .deliv-actions .back{
  display:flex;align-items:center;gap:8px;color:var(--b-ink-muted);
  font-family:'Barlow Condensed','Barlow',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;
}
.deliv-view .deliv-actions .back:hover{color:var(--b-teal)}
.deliv-view .deliv-actions .title-mini{
  font-family:'Lora',Georgia,serif;font-style:italic;font-size:15px;color:var(--b-ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.deliv-view .deliv-btn{
  padding:8px 16px;font-size:12.5px;font-weight:600;border-radius:6px;
  border:1px solid var(--b-line);background:var(--b-paper);color:var(--b-ink);
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;cursor:pointer;
}
.deliv-view .deliv-btn:hover{border-color:var(--b-teal);color:var(--b-teal)}
.deliv-view .deliv-btn-primary{background:var(--b-teal);color:#fff;border-color:var(--b-teal)}
.deliv-view .deliv-btn-primary:hover{background:var(--b-teal-dark);color:#fff;border-color:var(--b-teal-dark)}
.deliv-view .deliv-btn-gold{background:var(--b-gold);color:var(--b-ink);border-color:var(--b-gold);font-weight:700}
.deliv-view .deliv-btn-gold:hover{background:#f59a00;border-color:#f59a00;color:var(--b-ink)}

/* Editorial sections */
.deliv-view .b-section{padding:clamp(56px,8vw,110px) clamp(28px,5vw,80px);position:relative}
.deliv-view .b-section-inner{max-width:1200px;margin:0 auto}
.deliv-view .b-section-cream{background:var(--b-cream)}
.deliv-view .b-section-cream-deep{background:var(--b-cream-deep)}
.deliv-view .b-section-warm{background:var(--b-warm-light)}
.deliv-view .b-section-paper{background:var(--b-paper)}
.deliv-view .b-section-dark{
  background:linear-gradient(135deg,var(--b-teal-deep) 0%,var(--b-ink) 100%);
  color:#fff;
}
.deliv-view .b-section-dark .b-eyebrow{color:var(--b-gold-mid)}
.deliv-view .b-section-dark .b-lede{color:rgba(255,255,255,.78)}
.deliv-view .b-section-dark .b-display{color:#fff}
.deliv-view .b-section-dark .b-display em{color:var(--b-gold-mid)}
.deliv-view .b-section-dark .b-slide-bullets li{color:rgba(255,255,255,.92)}
.deliv-view .b-section-dark .b-slide-bullets li::before{background:var(--b-gold-mid)}
.deliv-view .b-section-dark .b-slide-note{background:rgba(255,255,255,.06);border-left-color:var(--b-gold-mid);color:rgba(255,255,255,.85)}
.deliv-view .b-section-dark .b-slide-note::before{color:var(--b-gold-mid)}
.deliv-view .b-section-dark .b-slide-num{color:rgba(255,255,255,.5)}

/* Editorial type system */
.deliv-view .b-eyebrow{
  font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:11px;text-transform:uppercase;letter-spacing:.18em;
  color:var(--b-teal);font-weight:700;margin-bottom:24px;display:inline-block;
}
.deliv-view .b-display{
  font-family:'Lora',Georgia,serif;font-weight:500;
  font-size:clamp(36px,5.5vw,64px);line-height:1.05;letter-spacing:-0.015em;
  color:var(--b-ink);margin:0 0 24px;
}
.deliv-view .b-display em{font-style:italic;color:var(--b-teal);font-weight:500}
.deliv-view .b-display-xl{font-size:clamp(40px,6.5vw,76px)}
.deliv-view .b-display-md{font-size:clamp(28px,4vw,44px)}
.deliv-view .b-display-sm{font-size:clamp(22px,3vw,30px)}
.deliv-view .b-lede{
  font-size:clamp(15px,1.5vw,17px);line-height:1.65;color:var(--b-ink-muted);
  max-width:580px;margin:0 0 36px;
}
.deliv-view .b-body{font-size:14.5px;line-height:1.65;color:var(--b-ink);max-width:680px}
.deliv-view .b-body p{margin:0 0 14px}

.deliv-view .b-anchor{
  display:flex;flex-direction:column;align-items:flex-start;gap:4px;margin:24px 0;
}
.deliv-view .b-anchor-num{
  font-family:'Lora',Georgia,serif;font-size:clamp(72px,12vw,144px);
  font-weight:500;line-height:.95;letter-spacing:-0.03em;color:var(--b-teal-dark);
}
.deliv-view .b-anchor-num .plus{color:var(--b-gold);font-weight:400}
.deliv-view .b-anchor-num .unit{font-size:.4em;color:var(--b-warm);font-weight:500;letter-spacing:0;margin-left:6px}
.deliv-view .b-anchor-label{
  font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--b-warm);font-weight:700;
}

/* Hero with right-side anchor */
.deliv-view .b-hero{display:grid;grid-template-columns:1.4fr 1fr;gap:60px;align-items:center}
@media (max-width:780px){.deliv-view .b-hero{grid-template-columns:1fr;gap:40px}}
.deliv-view .b-hero-stat{
  background:#fff;border-radius:14px;padding:36px;border:1px solid var(--b-line);
  text-align:center;
}
.deliv-view .b-hero-stat .b-anchor-num{justify-self:center;color:var(--b-teal-dark)}
.deliv-view .b-hero-stat .b-anchor{align-items:center}

/* Section divider — gold rule */
.deliv-view .b-rule{
  width:48px;height:2px;background:var(--b-gold);margin:0 0 28px;border:0;
}

/* Pull quote */
.deliv-view .b-pull{text-align:center;max-width:880px;margin:0 auto;position:relative}
.deliv-view .b-pull::before{
  content:"\201C";font-family:'Lora',Georgia,serif;font-size:120px;line-height:1;
  color:var(--b-teal);opacity:.25;display:block;margin-bottom:-30px;
}
.deliv-view .b-pull-text{
  font-family:'Lora',Georgia,serif;font-style:italic;
  font-size:clamp(22px,2.8vw,30px);line-height:1.45;color:var(--b-ink);margin:0 0 24px;
}
.deliv-view .b-pull-attr{
  font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--b-warm);font-weight:600;
}

/* Numbered list (rhythm sections) */
.deliv-view .b-numbered{display:grid;gap:28px;margin-top:36px}
.deliv-view .b-numbered-item{
  display:grid;grid-template-columns:80px 1fr;gap:24px;align-items:start;
  padding:24px 0;border-top:1px solid var(--b-line);
}
.deliv-view .b-numbered-item:first-child{border-top:0;padding-top:0}
.deliv-view .b-numbered-item .num{
  font-family:'Lora',Georgia,serif;font-size:48px;font-weight:500;color:var(--b-teal);
  line-height:1;letter-spacing:-0.02em;
}
.deliv-view .b-numbered-item .label{
  font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--b-warm);font-weight:700;margin-bottom:6px;
}
.deliv-view .b-numbered-item .text{font-size:15px;line-height:1.6;color:var(--b-ink)}
.deliv-view .b-numbered-item .title{
  font-family:'Lora',Georgia,serif;font-size:18px;font-weight:500;color:var(--b-ink);margin:0 0 4px;line-height:1.3;
}

/* Card grid (services / categories) */
.deliv-view .b-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:32px}
.deliv-view .b-card{
  background:#fff;border:1px solid var(--b-line);border-radius:12px;
  padding:24px 26px;transition:all .15s;
}
.deliv-view .b-card-title{
  font-family:'Lora',Georgia,serif;font-size:18px;font-weight:500;color:var(--b-ink);margin:0 0 8px;line-height:1.3;
}
.deliv-view .b-card-text{font-size:13.5px;line-height:1.55;color:var(--b-ink-muted);margin:0}

/* "Start here" highlight */
.deliv-view .b-start-here{
  background:linear-gradient(135deg,var(--b-gold-soft),#fff);
  border:1px solid var(--b-gold-mid);border-radius:14px;
  padding:36px 40px;margin-top:36px;
  display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;
}
.deliv-view .b-start-here .b-start-num{
  font-family:'Lora',Georgia,serif;font-size:64px;font-weight:500;color:var(--b-gold);line-height:.95;
}
.deliv-view .b-start-here .b-start-label{
  font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--b-warm-deep);font-weight:700;margin-bottom:8px;
}
.deliv-view .b-start-here .b-start-body{font-family:'Lora',Georgia,serif;font-size:18px;line-height:1.5;color:var(--b-ink)}

/* Service commitments list */
.deliv-view .b-commits{display:grid;gap:14px;margin-top:24px}
.deliv-view .b-commit{
  display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;
  padding:14px 18px;background:#fff;border-radius:10px;border:1px solid var(--b-line);
}
.deliv-view .b-commit .check{
  width:24px;height:24px;border-radius:50%;background:var(--b-teal);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  flex-shrink:0;
}
.deliv-view .b-commit .text{font-size:14px;line-height:1.5;color:var(--b-ink)}

/* Slide section (for Value Deck) */
.deliv-view .b-slide{padding:clamp(60px,9vw,120px) clamp(28px,5vw,80px);position:relative}
.deliv-view .b-slide-num{
  position:absolute;top:24px;right:clamp(28px,5vw,80px);
  font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--b-warm);font-weight:700;
}
.deliv-view .b-slide-bullets{margin-top:24px;display:grid;gap:12px;max-width:760px}
.deliv-view .b-slide-bullets li{
  list-style:none;font-size:16px;line-height:1.55;color:var(--b-ink);
  padding-left:28px;position:relative;
}
.deliv-view .b-slide-bullets li::before{
  content:"";position:absolute;left:0;top:11px;width:14px;height:1.5px;background:var(--b-gold);
}
.deliv-view .b-slide-note{
  margin-top:36px;padding:18px 22px;border-left:3px solid var(--b-teal);
  background:rgba(0,129,141,.04);max-width:680px;
  font-family:'Lora',Georgia,serif;font-style:italic;font-size:14.5px;line-height:1.6;color:var(--b-ink-muted);
}
.deliv-view .b-slide-note::before{
  content:"SPEAKER NOTE";display:block;font-style:normal;font-family:'Barlow Condensed','Barlow',sans-serif;
  font-size:10px;letter-spacing:.18em;color:var(--b-teal);font-weight:700;margin-bottom:6px;
}

/* Video embed */
.deliv-view .b-video{
  position:relative;width:100%;max-width:880px;margin:36px auto;
  aspect-ratio:16/9;border-radius:14px;overflow:hidden;
  background:var(--b-ink);box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.deliv-view .b-video iframe{width:100%;height:100%;border:0;display:block}

/* Contact card (dark) */
.deliv-view .b-contact{
  background:linear-gradient(135deg,var(--b-teal-deep) 0%,var(--b-ink) 100%);color:#fff;
  border-radius:18px;padding:48px 52px;margin-top:24px;
  display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:center;
}
@media (max-width:780px){.deliv-view .b-contact{grid-template-columns:1fr;text-align:center;padding:36px 30px}}
.deliv-view .b-contact .avatar{
  width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lora',Georgia,serif;font-size:36px;font-weight:500;
  border:2px solid var(--b-gold-mid);flex-shrink:0;
}
.deliv-view .b-contact .name{font-family:'Lora',Georgia,serif;font-size:28px;font-weight:500;margin:0 0 4px}
.deliv-view .b-contact .role{font-family:'Barlow Condensed','Barlow',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--b-gold-mid);font-weight:600;margin-bottom:16px}
.deliv-view .b-contact .details{display:grid;gap:8px;font-size:14px;line-height:1.5}
.deliv-view .b-contact .details .lab{
  font-family:'Barlow Condensed','Barlow',sans-serif;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:700;margin-right:10px;
}

/* Footer */
.deliv-view .b-footer{
  background:var(--b-cream-deep);padding:48px 30px;text-align:center;border-top:1px solid var(--b-line);
}
.deliv-view .b-footer .ymatter{
  font-family:'Lora',Georgia,serif;font-style:italic;font-size:22px;color:var(--b-teal);margin:0 0 14px;
}
.deliv-view .b-footer .addr{
  font-family:'Barlow Condensed','Barlow',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.18em;
  color:var(--b-warm);font-weight:600;
}
.deliv-view .b-footer .fine{font-size:11px;color:var(--b-warm);margin-top:8px;font-style:italic}

/* Editable text — when in edit mode */
.deliv-view.editing [contenteditable="true"]{
  background:rgba(255,172,39,.10);outline:1px dashed var(--b-gold);outline-offset:4px;border-radius:3px;
  cursor:text;transition:all .15s;
}
.deliv-view.editing [contenteditable="true"]:focus{
  outline:2px solid var(--b-gold);background:rgba(255,172,39,.18);
}

/* === DELIVERABLE TILE — info button === */
.deliv-tile{position:relative}
.deliv-tile .deliv-info-btn{
  position:absolute;top:14px;right:14px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(0,129,141,.08);color:var(--brand);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lora',serif;font-style:italic;font-weight:600;font-size:13px;
  border:1px solid transparent;transition:all .15s;cursor:pointer;z-index:2;
}
.deliv-tile .deliv-info-btn:hover{background:var(--brand);color:#fff;transform:scale(1.1)}
.deliv-tile .deliv-status{
  display:inline-flex;align-items:center;gap:6px;
}
.deliv-tile .deliv-status .dot{
  width:7px;height:7px;border-radius:50%;background:var(--brand);
}
.deliv-tile .deliv-status.generating .dot{
  background:var(--gold);animation:pulseCore 1.5s ease-in-out infinite;
}

/* === REALTOR MATCH === */
.match-overlay{
  position:fixed;inset:0;background:var(--cream);z-index:995;overflow-y:auto;
  padding:24px clamp(20px,4vw,40px) 60px;
}
.match-close{
  position:fixed;top:18px;right:20px;z-index:5;
  width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid var(--rule-strong);
  display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;color:var(--muted);
  box-shadow:var(--shadow-sm);transition:all .15s;
}
.match-close:hover{color:var(--ink);border-color:var(--brand)}
.match-loading-wrap{max-width:520px;margin:80px auto 0}
.match-loading{padding:48px 30px;text-align:center}

.match-results-wrap{max-width:1100px;margin:0 auto}
.match-results-head{margin-bottom:30px;padding:20px 4px 0}
.match-results-foot{margin-top:32px;padding:24px 0;border-top:1px solid var(--rule);display:flex;gap:8px;justify-content:center}

.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.match-card{
  background:var(--paper);border:1px solid var(--rule);border-radius:14px;
  padding:20px 22px;display:flex;flex-direction:column;gap:12px;transition:all .15s;
}
.match-card:hover{border-color:var(--brand);box-shadow:var(--shadow)}
.match-card-head{display:flex;align-items:flex-start;gap:12px}
.match-card-head .match-score{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--gold-soft);color:var(--gold-deep);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;
}
.match-shared{
  padding:12px 14px;background:linear-gradient(135deg,#fff8e8,var(--paper));
  border:1px solid var(--gold-mid, var(--gold));border-radius:9px;
}
.match-card-foot{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding-top:12px;border-top:1px solid var(--rule);flex-wrap:wrap;
}
.match-source{
  font-family:var(--cond);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--brand);font-weight:600;
}
.match-source:hover{color:var(--brand-2);text-decoration:underline}

@media (max-width:780px){
  .match-grid{grid-template-columns:1fr}
  .match-results-head h1{font-size:24px!important}
}

/* === SHARED HOOKS BADGE === */
.agent-card .shared-pill{
  position:absolute;top:8px;left:8px;
  font-family:var(--cond);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  background:var(--gold);color:var(--navy);font-weight:700;
  padding:2px 7px;border-radius:10px;line-height:1.3;
  display:inline-flex;align-items:center;gap:4px;
  box-shadow:var(--shadow-sm);
}
.detail-head .shared-pill-large{
  display:inline-flex;align-items:center;gap:8px;padding:6px 12px;
  background:var(--gold-soft);border:1px solid var(--gold);border-radius:14px;
  font-family:var(--cond);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--gold-deep);font-weight:700;
}

.shared-hooks-panel{
  background:linear-gradient(135deg,#fffbf0,var(--paper));
  border:1px solid var(--gold);border-left:4px solid var(--gold);border-radius:10px;
  padding:14px 18px;margin:14px 0;
}
.shared-hooks-panel .sh-head{
  font-family:var(--cond);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold-deep);font-weight:700;margin-bottom:8px;
}
.shared-hooks-panel ul{margin:0;padding-left:18px;font-size:13px;line-height:1.6;color:var(--ink-2)}
.shared-hooks-panel ul li b{color:var(--navy);font-weight:600}

/* === USER PILL (topbar, Firebase mode) === */
.topbar .right .user-pill{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--brand),var(--brand-deep));
  color:#fff;font-family:var(--serif);font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.12);transition:all .15s;
  overflow:hidden;padding:0;
}
.topbar .right .user-pill:hover{border-color:var(--gold);transform:scale(1.05)}

/* === AUTH GATE === */
.auth-gate{
  position:fixed;inset:0;background:var(--cream);z-index:998;
  display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto;
}
.auth-card{
  max-width:440px;width:100%;background:var(--paper);border:1px solid var(--rule);
  border-radius:16px;padding:40px 36px;box-shadow:var(--shadow-lg);text-align:center;
}
.auth-card .auth-mark{
  width:64px;height:64px;margin:0 auto 18px;position:relative;
}
.auth-card .auth-mark .radar-logo{width:100%;height:100%}
.auth-card .eyebrow{
  font-family:var(--cond);font-size:11px;letter-spacing:2.2px;text-transform:uppercase;
  color:var(--brand);font-weight:600;margin-bottom:10px;
}
.auth-card h1{
  font-family:var(--serif);font-size:30px;font-weight:600;color:var(--navy);
  margin:0 0 8px;letter-spacing:-.4px;line-height:1.15;
}
.auth-card h1 em{color:var(--brand);font-style:italic}
.auth-card .auth-lede{
  font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted);
  line-height:1.55;margin:0 0 28px;
}
.auth-card .field{text-align:left}
.auth-card .field input{padding:12px 14px;font-size:14px}
.auth-card .auth-btn{width:100%;padding:13px 20px;font-size:14px;margin-top:6px;justify-content:center}
.auth-card .auth-hint{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5}
.auth-card .auth-sent{
  background:var(--brand-tint);border-radius:10px;padding:18px 20px;text-align:left;margin-top:8px;
}
.auth-card .auth-sent b{color:var(--navy)}
.auth-card .you-matter{
  font-family:var(--serif);font-style:italic;font-size:13px;color:var(--brand-2);
  margin-top:28px;letter-spacing:.2px;
}

@media (max-width:780px){
  .auth-card{padding:32px 24px}
  .auth-card h1{font-size:24px}
  .auth-card .auth-lede{font-size:14px}
}

/* === RESPONSIVE — tablet === */
@media (max-width:1024px){
  .page{padding:28px 24px 80px}
  .page-hero h1{font-size:36px}
  .col{flex:0 0 264px}
  .draft-grid{grid-template-columns:240px 1fr;gap:18px}
  .set-grid{gap:24px}
}

/* === RESPONSIVE — mobile === */
@media (max-width:780px){
  body{font-size:14px}

  /* Topbar — wrap, scrollable nav */
  .topbar{padding:11px 14px;flex-wrap:wrap;gap:10px;row-gap:8px}
  .topbar .brand{flex:1;min-width:0}
  .topbar .brand-mark{width:34px;height:34px}
  .topbar .brand-text .name{font-size:16px}
  .topbar .brand-text .sub{font-size:9.5px;letter-spacing:1.3px}
  .topbar .right{margin-left:0;gap:6px}
  .topbar .right .ai-status{padding:5px 10px;font-size:10.5px}
  .topbar .right .ai-status .label-text{display:none}
  .topbar .right .icon-btn{width:34px;height:34px}
  .topbar nav{
    margin-left:0;width:100%;order:99;overflow-x:auto;padding-bottom:2px;
    scrollbar-width:none;-ms-overflow-style:none;
    gap:0;
  }
  .topbar nav::-webkit-scrollbar{display:none}
  .topbar nav button{padding:8px 13px;font-size:12.5px;flex-shrink:0;border-radius:6px}
  .topbar nav button .nav-count{font-size:10px}

  /* Page padding */
  .page{padding:20px 14px 100px}

  /* Hero — full stack */
  .page-hero{flex-direction:column;align-items:flex-start;gap:20px;margin-bottom:24px}
  .page-hero h1{font-size:28px;line-height:1.1;letter-spacing:-.4px}
  .page-hero .lede{font-size:15px;margin-top:10px}
  .page-hero .eyebrow{font-size:10.5px;letter-spacing:1.8px}
  .page-hero .stats{width:100%;grid-template-columns:repeat(2,1fr);gap:14px}
  .page-hero .stat{padding-left:14px}
  .page-hero .stat .n{font-size:26px}
  .page-hero .stat .lab{font-size:10px}

  /* Buttons — touch-friendly */
  .btn{padding:11px 16px;font-size:13.5px}
  .btn-sm{padding:9px 13px;font-size:12.5px}
  .btn-lg{padding:14px 20px;font-size:14.5px}

  /* Kanban — keep horizontal scroll, narrow cards a bit */
  .col{flex:0 0 240px;max-height:calc(100vh - 320px);padding:12px 10px}
  .agent-card{padding:11px}
  .agent-card .row1 .name{font-size:13px}

  /* Detail head — stack */
  .detail-head{flex-direction:column;padding:20px 18px;gap:16px;margin-bottom:18px}
  .detail-head .avatar{width:56px;height:56px;font-size:20px}
  .detail-head h1{font-size:24px}
  .detail-head .actions{width:100%;justify-content:flex-end}
  .detail-stats{grid-template-columns:repeat(3,1fr);gap:0;padding-top:14px}
  .detail-stats .ds{padding:0 10px;border-right:1px solid var(--rule)}
  .detail-stats .ds:nth-child(3n){border-right:0}
  .detail-stats .ds:nth-child(n+4){margin-top:14px;padding-top:14px;border-top:1px solid var(--rule)}
  .detail-stats .ds .v{font-size:16px}

  /* Tabs — tighter */
  .tabs button{padding:10px 14px;font-size:12.5px;gap:5px}

  /* Panels */
  .panel{padding:18px 16px;margin-bottom:16px;border-radius:10px}
  .panel-title{font-size:15px}

  /* Two-column overview grid → stack */
  .panel + .panel,.draft-grid,.deliv-grid,.set-grid,.dossier-grid,.nudge-grid,.value-list{
    grid-template-columns:1fr!important;
  }
  .agent-card .next{font-size:12px}

  /* Cadence steps — tighter */
  .step{padding:12px 0;gap:11px}
  .step .check{width:22px;height:22px}
  .step .action-name{font-size:13.5px}
  .step .prompt{font-size:12.5px}

  /* Modals — full width, small margins */
  .modal-shade{padding:8px}
  .modal{border-radius:12px;max-height:calc(100vh - 16px)}
  .modal-head{padding:16px 18px 12px}
  .modal-head .title{font-size:18px}
  .modal-body{padding:16px 18px}
  .modal-foot{padding:12px 18px;flex-wrap:wrap}
  .modal-foot .btn{flex:1;min-width:0;justify-content:center}

  /* Forms — full bleed */
  .field{margin-bottom:14px}
  .field .row{flex-direction:column;gap:8px}

  /* Chips — wrap & touch-friendly */
  .chip{padding:8px 14px;font-size:12.5px}
  .chip-row{gap:6px}

  /* Search box */
  .searchbox{max-width:none;width:100%}

  /* List view — hide some columns */
  .list-view table{font-size:12.5px}
  .list-view th,.list-view td{padding:10px 11px}
  .list-view th:nth-child(2),.list-view td:nth-child(2),
  .list-view th:nth-child(6),.list-view td:nth-child(6),
  .list-view th:nth-child(7),.list-view td:nth-child(7){display:none}

  /* Settings side nav — horizontal scroll bar */
  .set-side .set-nav{flex-direction:row;overflow-x:auto;padding-bottom:6px;gap:4px}
  .set-side .set-nav::-webkit-scrollbar{display:none}
  .set-side .set-nav button{flex-shrink:0;padding:9px 14px;font-size:12.5px}

  /* Playbook big stats — 2 col */
  .playbook-cad h2{font-size:20px}
  .pb-step{gap:14px;padding:13px 0}
  .pb-step .day-dot{width:42px}
  .pb-step .day-dot .num{font-size:20px}
  .pb-step .pb-name{font-size:14px}

  /* Cadence head */
  .cadence-head{flex-direction:column;align-items:stretch;gap:10px;padding:12px 14px}
  .cadence-head .name{font-size:15px}

  /* Switch banner */
  .switch-banner{flex-direction:column;align-items:stretch;text-align:left;gap:10px;padding:14px}

  /* Onboarding */
  .onb{padding:24px 8px}
  .onb h1{font-size:38px;letter-spacing:-.6px}
  .onb .lede{font-size:16px}
  .onb .steps{grid-template-columns:1fr;gap:12px;margin-bottom:24px}
  .onb-shade{padding:16px}

  /* Insight inline */
  .insight{padding:12px 14px;gap:10px}
  .insight .body{font-size:12.5px}

  /* Deliverable tiles */
  .deliv-tile{padding:18px 18px 16px}
  .deliv-tile h3{font-size:16px}

  /* Toast — push above bottom nav area */
  .toast{bottom:18px;left:14px;right:14px;transform:none;text-align:center;justify-content:center}
}

/* === RESPONSIVE — tiny phones === */
@media (max-width:380px){
  .topbar .brand-text .sub{display:none}
  .page-hero h1{font-size:24px}
  .page-hero .stats{grid-template-columns:1fr 1fr;gap:10px}
  .col{flex:0 0 220px}
  .deliv-tile h3{font-size:15px}
  .onb h1{font-size:32px}
}

/* === Touch — bigger tap targets === */
@media (hover:none) and (pointer:coarse){
  .btn{min-height:42px}
  .btn-sm{min-height:38px}
  .chip{min-height:36px}
  .agent-card{min-height:80px}
  .tabs button{min-height:42px}
  .nav button{min-height:38px}
  .topbar nav button{min-height:36px}
}

@media print{.topbar,.modal-foot,.btn{display:none!important}body{background:#fff}}

/* ====== VIEW TRANSITIONS (snappy, not jumpy) ====== */
.view-enter{opacity:0;transform:translateY(9px)}
.view-enter.view-in{opacity:1;transform:none;transition:opacity .2s ease,transform .24s cubic-bezier(.2,.7,.3,1)}
.topbar nav button{transition:background .15s ease,color .15s ease}
.agent-card,.tpl-card,.dir-row{transition:box-shadow .16s ease,transform .16s ease,border-color .16s ease}
.btn{transition:background .14s ease,box-shadow .14s ease,transform .06s ease}
.btn:active{transform:translateY(1px)}

/* ====== CADENCE — focused up-next ====== */
.cad-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.cad-top .ph .label{font-family:var(--cond);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brand);font-weight:600}
.cad-top .ph .name{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--navy);line-height:1.2;margin-top:2px}
.cad-top .ph .name em{font-style:italic;color:var(--muted);font-weight:500;font-size:16px}
.cad-progress{margin-bottom:20px}
.cad-progress .bar{height:7px;border-radius:999px;background:var(--cream-2);overflow:hidden;border:1px solid var(--rule)}
.cad-progress .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand-3),var(--brand));transition:width .4s ease}
.cad-progress .lab{display:flex;justify-content:space-between;font-family:var(--cond);font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:7px}
.upnext{position:relative;background:#fff;border:1px solid var(--rule);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.upnext.due{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft),var(--shadow)}
.upnext.overdue{border-color:#e08a8a;box-shadow:0 0 0 3px rgba(198,40,40,.08),var(--shadow)}
.upnext-strip{display:flex;align-items:stretch}
.upnext-count{flex-shrink:0;width:138px;background:linear-gradient(160deg,var(--brand-deep),var(--brand));color:#fff;padding:20px 16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.upnext-count.due{background:linear-gradient(160deg,var(--gold-2),var(--gold))}
.upnext-count.overdue{background:linear-gradient(160deg,#9a2a2a,#c62828)}
.upnext-count .big{font-family:var(--serif);font-size:42px;font-weight:600;line-height:.95;letter-spacing:-1px}
.upnext-count .unit{font-family:var(--cond);font-size:12px;letter-spacing:1.4px;text-transform:uppercase;opacity:.9;margin-top:4px}
.upnext-count .when{font-family:var(--cond);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;opacity:.85;margin-top:10px}
.upnext-body{flex:1;padding:18px 22px;min-width:0}
.upnext-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap}
.upnext-eyebrow .lbl{font-family:var(--cond);font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--brand);font-weight:700}
.upnext-eyebrow .stepno{font-family:var(--cond);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.upnext-eyebrow .ch{font-family:var(--cond);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;font-weight:600;color:var(--ink-2);background:var(--cream-2);padding:3px 9px;border-radius:999px}
.upnext-eyebrow .opt{font-style:italic;color:var(--muted-2);font-size:11px}
.upnext-action{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:7px}
.upnext-prompt{font-size:13.5px;line-height:1.6;color:var(--ink-2)}
.upnext-tasks{margin:11px 0 0;padding-left:18px;font-size:13px;color:var(--ink-2);line-height:1.5}
.upnext-tasks li{margin:3px 0}
.upnext-actions{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
.upnext-done{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--brand-tint),var(--paper));border:1px solid var(--brand-3);border-radius:16px;padding:24px 26px}
.upnext-done .mk{font-size:34px}
.upnext-done h3{font-family:var(--serif);font-size:20px;color:var(--navy);margin:0 0 4px;font-weight:600}
.upnext-done p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.55}
.cad-toolbar{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center}
.cad-full{margin-top:18px;border-top:1px solid var(--rule);padding-top:18px}
.cad-timeline{position:relative;margin-left:6px;padding-left:26px}
.cad-timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--rule-strong)}
.ct-step{position:relative;padding:11px 0}
.ct-dot{position:absolute;left:-26px;top:14px;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--rule-strong);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;transition:all .15s}
.ct-step.done .ct-dot{background:var(--brand);border-color:var(--brand)}
.ct-step.current .ct-dot{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
.ct-meta{display:flex;gap:9px;align-items:center;font-family:var(--cond);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.ct-meta .d{color:var(--brand);font-weight:600}
.ct-name{font-size:14px;font-weight:600;color:var(--navy)}

  if(!FIREBASE_ENABLED || !window.RR_FB) return false;
  if(_fbApp) return true;
  try {
    _fbApp = window.RR_FB.initializeApp(FIREBASE_CONFIG);
    _fbAuth = window.RR_FB.getAuth(_fbApp);
    _fbDb = window.RR_FB.getFirestore(_fbApp);
    return true;
  } catch(e){
    console.error('Firebase init failed:', e);
    return false;
  }
}

function isAdmin(){
  return auth.user && TEMPLATES_ADMIN_EMAIL && auth.user.email === TEMPLATES_ADMIN_EMAIL;
}

function friendlyAuthError(e){
  var code = (e && e.code) || '';
  var msg = (e && e.message) || 'unknown error';
  if(code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found'){
    return 'Email or password is incorrect. Check both and try again — or use “Forgot password?”';
  }
  if(code === 'auth/email-already-in-use'){
    return 'An account already exists for that email. Switch to “Sign in” instead.';
  }
  if(code === 'auth/weak-password'){
    return 'Password is too short — use at least 6 characters.';
  }
  if(code === 'auth/operation-not-allowed'){
    return 'Email/password sign-in isn’t turned on yet. An admin needs to enable it in Firebase (Authentication → Sign-in method → Email/Password).';
  }
  if(code === 'auth/invalid-email'){ return 'That email doesn’t look right — check the spelling and try again.'; }
  if(code === 'auth/user-disabled'){ return 'This account has been disabled. Contact your admin.'; }
  if(code === 'auth/too-many-requests'){ return 'Too many attempts just now. Wait a minute, then try again.'; }
  if(code === 'auth/network-request-failed'){ return 'Network problem reaching the sign-in service. Check your connection and try again.'; }
  return 'Something went wrong: ' + msg;
}

async function fbSignIn(email, password){
  if(!fbInit()) throw new Error('Firebase not configured');
  await window.RR_FB.signInWithEmailAndPassword(_fbAuth, email, password);
}

async function fbSignUp(email, password){
  if(!fbInit()) throw new Error('Firebase not configured');
  await window.RR_FB.createUserWithEmailAndPassword(_fbAuth, email, password);
}

async function fbResetPassword(email){
  if(!fbInit()) throw new Error('Firebase not configured');
  await window.RR_FB.sendPasswordResetEmail(_fbAuth, email);
}

async function fbSignOut(){
  if(!fbInit()) return;
  try {
    await window.RR_FB.signOut(_fbAuth);
  } catch(e){ console.warn('Sign-out error', e); }
}

/* ========== STORAGE ========== */
function _strippedState(){
  const safe = { ...state };
  delete safe.view; delete safe.activeAgentId; delete safe.activeTab;
  delete safe.filterTier; delete safe.filterStage; delete safe.filterSide; delete safe.search;
  delete safe.settingsTab; delete safe.pipelineView;
  // Remove transient per-agent fields
  if(Array.isArray(safe.agents)){
    safe.agents = safe.agents.map(a => {
      const c = { ...a };
      delete c._draft; delete c._lastDraft; delete c._generating; delete c._generatingDeliv;
      delete c._researching; delete c._dismissSwitch;
      return c;
    });
  }
  return safe;
}

function save(){
  // Debounce Firestore writes (1s); localStorage writes are instant
  try {
    const safe = _strippedState();
    if(auth.mode === 'firebase' && auth.user && _fbDb){
      // Mirror to localStorage as a cache + offline buffer
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(safe)); } catch(e){}
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(async () => {
        try {
          const ref = window.RR_FB.doc(_fbDb, 'users', auth.user.uid);
          await window.RR_FB.setDoc(ref, { state: safe, updatedAt: window.RR_FB.serverTimestamp(), email: auth.user.email }, { merge: true });
        } catch(e){
          console.warn('Firestore save failed:', e);
          toast('Cloud sync paused — your work is saved locally', 'error');
        }
      }, 1000);
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(safe));
    }
  } catch(e){ console.warn('Save failed', e); toast('Storage error — try exporting your data','error'); }
}

async function load(){
  // Firebase mode: read user doc; fall back to localStorage cache if offline
  if(auth.mode === 'firebase' && auth.user && _fbDb){
    try {
      const ref = window.RR_FB.doc(_fbDb, 'users', auth.user.uid);
      const snap = await window.RR_FB.getDoc(ref);
      if(snap.exists() && snap.data().state){
        state = { ...state, ...snap.data().state };
        return true;
      }
      // No remote doc — check localStorage cache
    } catch(e){ console.warn('Firestore load failed, using local cache', e); }
  }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    state = { ...state, ...data };
    return true;
  } catch(e){ console.warn('Load failed', e); return false; }
}

async function loadTemplates(){
  // Read shared templates doc (cadences/value menu/brand facts overrides)
  // Admin can publish via Settings → Templates. All non-admin users read-only.
  if(!FIREBASE_ENABLED || !_fbDb) return;
  try {
    const ref = window.RR_FB.doc(_fbDb, 'templates', 'v1');
    const snap = await window.RR_FB.getDoc(ref);
    if(snap.exists()){
      const t = snap.data();
      // Only apply on first load or when explicit version bump
      if(t.brandFacts && !state.brandFactsCustomized) state.brandFacts = t.brandFacts;
      if(t.valueMenu && !state.valueMenuCustomized) state.valueMenu = t.valueMenu;
      // Cadences are sealed in code — templates can override at runtime if needed in v2
    }
  } catch(e){ console.warn('Templates load failed', e); }
}

function importDB(file){
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const obj = JSON.parse(ev.target.result);
      const data = obj.data || obj;
      if(!data.agents){ toast('That doesn\u2019t look like a Realtor Radar backup','error'); return; }
      if(!confirm(`Import will replace all current data with ${data.agents.length} agents. Continue?`)) return;
      state = { ...state, ...data };
      save();
      toast('Backup restored','success');
      render();
    } catch(e){ toast('Couldn\u2019t parse that file','error'); }
  };
  reader.readAsText(file);
}
