/* ========== RENDER: PLAYBOOK ========== */
function renderPlaybook(){
  const page = e('div','page');
  page.appendChild(e('div','page-hero',
    e('div','titles',
      e('div','eyebrow','The Playbook'),
      e('h1',null, 'The ', e('em',null,'science'), ' of courting agents.'),
      e('p','lede','Every step in every cadence is here, with the data that backs it. Read it once, refer to it forever. These rhythms come from MGIC, Homebot, BeSmartee, and dozens of top originators — distilled into something you can actually run.'),
    ),
  ));

  // Top stat row — the meta-research
  const stats = e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'16px',marginBottom:'32px'}},
    bigStat('35', '/day', 'LO pitches the average agent gets', 'Homebot 2025'),
    bigStat('77', '%', 'of agents already have a go-to lender', 'Homebot 2025'),
    bigStat('59', '%', 'rank responsiveness as the #1 factor', 'Homebot 2025'),
    bigStat('96', '%', 'of top LOs say agents are their best source', 'MGIC'),
    bigStat('30', '%', 'higher conversion on referred customers', 'BeSmartee'),
    bigStat('53', '%', 'of top LOs attend ≥1 closing per week', 'MGIC'),
  );
  page.appendChild(stats);

  // Each cadence as a section
  Object.values(CADENCES).forEach(cad => {
    const sec = e('div','playbook-cad');
    const head = e('h2',null, cad.name.split('—')[0].trim(), cad.name.includes('—') ? e('em',null, ' — ' + cad.name.split('—')[1].trim()) : null);
    sec.appendChild(head);
    sec.appendChild(e('div','sub', cad.sub));
    cad.steps.forEach(step => {
      sec.appendChild(renderPlaybookStep(step));
    });
    page.appendChild(sec);
  });

  // Relationship killers section
  const killers = e('div','playbook-cad');
  killers.appendChild(e('h2',null, 'Relationship ', e('em',null,'killers'), ' to avoid'));
  killers.appendChild(e('div','sub','What top originators wish they\u2019d known sooner.'));
  ['communication_kills','guidelines_lie','no_loyalty_assumption','monday_calls','respa_warning'].forEach(k => {
    const ins = INSIGHTS[k];
    if(!ins) return;
    killers.appendChild(e('div',{style:{padding:'16px 20px',background:'#fff5f5',borderLeft:'3px solid #c62828',borderRadius:'8px',marginBottom:'10px'}},
      e('div',{style:{fontWeight:'600',color:'var(--navy)',fontSize:'14px',marginBottom:'4px'}}, '✗ ' + ins.headline),
      e('div',{style:{fontSize:'13px',color:'var(--ink-2)',lineHeight:'1.55'}}, ins.detail),
      e('div',{style:{fontSize:'11px',color:'var(--muted)',fontStyle:'italic',marginTop:'5px'}}, 'Source: ' + ins.source),
    ));
  });
  page.appendChild(killers);

  return page;
}

    e('div',{style:{fontFamily:'var(--serif)',fontSize:'40px',fontWeight:'600',color:'var(--navy)',lineHeight:'1',letterSpacing:'-1px'}}, num, e('span',{style:{fontSize:'18px',color:'var(--brand)',fontWeight:'500',marginLeft:'2px'}}, unit)),

function renderPlaybookStep(step){
  const ins = step.insight ? INSIGHTS[step.insight] : null;
  return e('div','pb-step',
    e('div','day-dot',
      e('div','num', 'D+' + step.day),
      e('div','lab', step.optional ? 'optional' : ''),
    ),
    e('div','pb-body',
      e('div','pb-meta',
        e('span','channel', chLabel(step.channel).toUpperCase()),
        step.optional ? e('span',{style:{color:'var(--muted)',fontStyle:'italic'}},'optional') : null,
      ),
      e('div','pb-name', step.action),
      e('div','pb-prompt', step.prompt),
      step.tasks?.length ? e('ul',{style:{paddingLeft:'18px',fontSize:'12.5px',color:'var(--ink-2)',marginTop:'4px'}}, ...step.tasks.map(t => e('li',{style:{margin:'2px 0'}}, t))) : null,
      ins ? e('div','pb-insight',
        e('b',null, ins.headline),
        ' — ' + ins.detail,
        e('em',null, 'Source: ' + ins.source),
      ) : null,
    ),
  );
}

function openApplyNudgeModal(nudgeId){
  const n = NUDGES.find(x => x.id === nudgeId);
  if(!n) return;
  if(state.agents.length === 0){
    toast('Add an agent first','error'); return;
  }
  const content = e('div',null);
  content.appendChild(e('div','modal-head',
    e('div','title', 'Apply nudge: ', e('em',null, n.name)),
    e('button',{class:'close', onclick:closeModal}, '×'),
  ));
  const body = e('div','modal-body');
  body.appendChild(e('div',{style:{padding:'14px 18px',background:'var(--brand-tint)',borderRadius:'10px',marginBottom:'18px'}},
    e('div',{style:{fontSize:'13px',color:'var(--ink-2)',lineHeight:'1.55'}}, n.desc),
  ));
  body.appendChild(e('div','field',
    e('label',null,'Apply to which agent(s)?'),
    e('div',{style:{maxHeight:'300px',overflowY:'auto',border:'1px solid var(--rule)',borderRadius:'8px',padding:'8px'}},
      ...state.agents.map(a => e('label',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',cursor:'pointer',borderRadius:'6px'},
        onmouseenter:ev=>ev.currentTarget.style.background='var(--brand-soft)',
        onmouseleave:ev=>ev.currentTarget.style.background='transparent',
      },
        e('input',{type:'checkbox', class:'nudge-target', 'data-id': a.id}),
        e('div',{style:{flex:'1'}},
          e('div',{style:{fontSize:'13.5px',fontWeight:'500'}}, a.name),
          e('div',{style:{fontSize:'11.5px',color:'var(--muted)'}}, a.brokerage || ''),
        ),
        e('span',`tier tier-${a.tier}`, a.tier),
      )),
    ),
  ));
  content.appendChild(body);
  content.appendChild(e('div','modal-foot',
    e('button',{class:'btn btn-ghost', onclick:closeModal}, 'Cancel'),
    e('button',{class:'btn btn-primary', onclick:()=>{
      const checked = [...document.querySelectorAll('.nudge-target:checked')].map(c => c.getAttribute('data-id'));
      if(checked.length === 0){ toast('Pick at least one agent','error'); return; }
      checked.forEach(id => {
        const a = state.agents.find(x => x.id === id);
        if(!a) return;
        a.activity.unshift({ at:new Date().toISOString(), kind:'nudge', text:'Nudge applied: ' + n.name });
      });
      save();
      closeModal();
      toast(`Nudge applied to ${checked.length} agent${checked.length>1?'s':''}`,'success');
      // If applying to one, navigate there and pre-fill message draft
      if(checked.length === 1){
        const a = state.agents.find(x => x.id === checked[0]);
        a._draft = {
          channel: n.channel === 'social' ? 'ig_dm' : n.channel,
          tone: 'warm-professional',
          angle: n.name,
          note: n.desc,
          valueOffer: n.name,
        };
        state.activeAgentId = checked[0];
        state.view = 'agent';
        state.activeTab = 'messages';
        render();
      }
    }}, 'Log nudge'),
  ));
  openModal(content, { size:'lg' });
}

function renderSettings(){
  if(!state.settingsTab) state.settingsTab = 'ai';
  const page = e('div','page');
  page.appendChild(e('div','page-hero',
    e('div','titles',
      e('div','eyebrow','Settings'),
      e('h1',null, 'Tune your ', e('em',null,'Radar'), '.'),
    ),
  ));

  const grid = e('div','set-grid');
  // Side nav
  const side = e('div','set-side');
  const nav = e('div','set-nav');
  const tabs = [
    {id:'ai', name:'AI & Voice'},
    {id:'lo', name:'LO Profile'},
    {id:'brand', name:'Brand Facts'},
    {id:'values', name:'Value Menu'},
    {id:'data', name:'Data & Backup'},
    {id:'diag', name:'Diagnostics'},
  ];
  tabs.forEach(t => {
    nav.appendChild(e('button',{class: state.settingsTab===t.id?'active':'', onclick:()=>{ state.settingsTab=t.id; render(); }}, t.name));
  });
  side.appendChild(nav);
  grid.appendChild(side);

  // Main content
  const main = e('div');
  switch(state.settingsTab){
    case 'ai':     main.appendChild(renderSetAI()); break;
    case 'lo':     main.appendChild(renderSetLO()); break;
    case 'brand':  main.appendChild(renderSetBrand()); break;
    case 'values': main.appendChild(renderSetValues()); break;
    case 'data':   main.appendChild(renderSetData()); break;
    case 'diag':   main.appendChild(renderSetDiag()); break;
  }
  grid.appendChild(main);
  page.appendChild(grid);
  return page;
}

function parseCsv(text){
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if(lines.length === 0) return { agents:[], errors:['Empty'] };
  // Detect header
  const first = lines[0].toLowerCase();
  const hasHeader = first.includes('name') && first.includes('brokerage');
  let headers, dataLines;
  if(hasHeader){
    headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    dataLines = lines.slice(1);
  } else {
    headers = ['name','brokerage','area','side','tier','luxury','phone','email','instagram','linkedin','website','transactions_yr','avg_price','neighborhoods'];
    dataLines = lines;
  }
  const agents = [];
  const errors = [];
  dataLines.forEach((line, i) => {
    // simple CSV parse (no quoted commas — keep it simple)
    const cells = line.split(',').map(c => c.trim());
    if(!cells[0]){ return; }
    const obj = {};
    headers.forEach((h, j) => { if(cells[j]) obj[h] = cells[j]; });
    const data = {
      name: obj.name,
      brokerage: obj.brokerage || '',
      area: obj.area || '',
      side: ['buyer','listing','both'].includes(obj.side) ? obj.side : 'buyer',
      tier: ['A','B','C'].includes(obj.tier?.toUpperCase?.()) ? obj.tier.toUpperCase() : 'C',
      luxury: obj.luxury === 'true' || obj.luxury === 'TRUE' || obj.luxury === '1',
      phone: obj.phone || '',
      email: obj.email || '',
      instagram: obj.instagram || '',
      linkedin: obj.linkedin || '',
      website: obj.website || '',
      transactionsYr: obj.transactions_yr ? parseInt(obj.transactions_yr) : null,
      avgPrice: obj.avg_price || null,
      neighborhoods: obj.neighborhoods || '',
    };
    if(!data.name){ errors.push(`Row ${i+1}: missing name`); return; }
    agents.push(data);
  });
  return { agents, errors };
}


/* ========== AUTH GATE RENDER ========== */
let _authState = { stage:'idle', email:'', sending:false, msg:'' };

function renderAuthGate(){
  const wrap = e('div','auth-gate');
  const card = e('div','auth-card');

  // Logo (radar)
  card.appendChild(e('div','auth-mark', e('div','radar-logo',
    e('div','ring'),
    e('div','ring-2'),
    e('div','sweep'),
    e('div','core'),
    e('div','blip blip-1'),
    e('div','blip blip-2'),
    e('div','blip blip-3'),
  )));

  card.appendChild(e('div','eyebrow','Partners Marketing Studio'));
  card.appendChild(e('h1',null,'Realtor ', e('em',null,'Radar')));
  card.appendChild(e('p','auth-lede','Sign in with your Partners email. We\u2019ll send you a one-time link — no password to remember.'));

  if(_authState.stage === 'sent'){
    card.appendChild(e('div','auth-sent',
      e('div',{style:{fontFamily:'var(--cond)',fontSize:'10.5px',letterSpacing:'1.4px',textTransform:'uppercase',color:'var(--brand)',fontWeight:'600',marginBottom:'8px'}}, 'Link sent'),
      e('div',{style:{fontSize:'14px',color:'var(--ink-2)',lineHeight:'1.55'}},
        'Check ', e('b',null, _authState.email), ' for a sign-in link from Partners. Click it on this device to finish.',
      ),
      e('div',{style:{fontSize:'12px',color:'var(--muted)',marginTop:'10px'}}, 'Didn\u2019t arrive? Check spam, or '),
      e('button',{class:'btn btn-ghost btn-sm', style:{padding:'0',marginTop:'4px'}, onclick:()=>{ _authState = { stage:'idle', email:_authState.email, sending:false, msg:'' }; renderAuthGateOnly(); }}, 'Try again'),
    ));
  } else {
    card.appendChild(e('div','field',
      e('label',null,'Partners email'),
      e('input',{
        type:'email', class:'fi', id:'auth-email-input',
        placeholder: 'you' + (ALLOWED_EMAIL_DOMAIN || '@partnersmortgage.com'),
        value: _authState.email,
        autocomplete:'email',
        oninput: ev => { _authState.email = ev.target.value; },
        onkeydown: ev => { if(ev.key === 'Enter') document.getElementById('auth-send-btn').click(); },
      }),
    ));
    card.appendChild(e('button',{
      class: 'btn btn-primary auth-btn', id:'auth-send-btn',
      disabled: _authState.sending,
      onclick: async () => {
        const email = (document.getElementById('auth-email-input').value || '').trim().toLowerCase();
        if(!email || !email.includes('@')){ toast('Enter a valid email','error'); return; }
        if(ALLOWED_EMAIL_DOMAIN && !email.endsWith(ALLOWED_EMAIL_DOMAIN.toLowerCase())){
          toast('Use your Partners email — only ' + ALLOWED_EMAIL_DOMAIN + ' is allowed','error'); return;
        }
        _authState.sending = true; _authState.email = email;
        renderAuthGateOnly();
        try {
          await fbSendMagicLink(email);
          _authState.stage = 'sent'; _authState.sending = false;
          renderAuthGateOnly();
        } catch(e){
          _authState.sending = false;
          renderAuthGateOnly();
          toast('Couldn\u2019t send link: ' + (e.message || 'unknown error'),'error');
        }
      },
    }, _authState.sending ? e('span',null, e('span','spinner'), ' Sending…') : 'Send me a sign-in link'));

    if(ALLOWED_EMAIL_DOMAIN){
      card.appendChild(e('div','auth-hint','Restricted to ' + ALLOWED_EMAIL_DOMAIN + ' accounts. Your data is yours alone — no other LO can see it.'));
    }
  }

  card.appendChild(e('div','you-matter','❝ You matter. ❞'));

  wrap.appendChild(card);
  return wrap;
}
function renderAuthGateOnly(){
  const root = document.getElementById('app');
  root.innerHTML = '';
  root.appendChild(renderAuthGate());
}

/* ========== MAIN RENDER ========== */
function render(){
  const root = document.getElementById('app');
  root.innerHTML = '';

  // Auth gate (Firebase mode, not signed in)
  if(auth.mode === 'firebase' && !auth.user){
    root.appendChild(renderAuthGate());
    return;
  }

  // Onboarding first-run
  if(!state.onboarded){
    root.appendChild(renderOnboarding());
    return;
  }

  // Deliverable viewer takes over the full screen
  if(state.viewingDeliverable){
    const viewer = renderDeliverableViewer();
    if(viewer){ root.appendChild(viewer); return; }
    // If render fails, fall through to normal app
    state.viewingDeliverable = null;
  }

  root.appendChild(renderTopbar());
  const main = e('div','main');
  switch(state.view){
    case 'pipeline': main.appendChild(renderPipeline()); break;
    case 'agent':    main.appendChild(renderAgentDetail()); break;
    case 'agents':   main.appendChild(renderPipeline()); break;  // alias
    case 'playbook': main.appendChild(renderPlaybook()); break;
    case 'nudges':   main.appendChild(renderNudges()); break;
    case 'settings': main.appendChild(renderSettings()); break;
    default:         main.appendChild(renderPipeline());
  }
  root.appendChild(main);
}

/* ========== INIT ========== */
async function init(){
  // Local mode: simple boot
  if(!FIREBASE_ENABLED){
    auth.mode = 'local';
    auth.ready = true;
    const loaded = await load();
    if(!loaded){ state.onboarded = false; }
    render();
    bootCommon();
    return;
  }

  // Firebase mode: wait for SDK to be ready, then handle auth state
  const start = () => {
    if(!fbInit()){
      // SDK failed to load — fall back to local mode but warn
      auth.mode = 'local';
      auth.ready = true;
      console.warn('Firebase SDK unavailable — running in local mode');
      load().then(loaded => { if(!loaded) state.onboarded = false; render(); bootCommon(); });
      return;
    }

    // If returning from email link, finish sign-in BEFORE rendering anything
    fbCompleteSignIn().then(() => {
      window.RR_FB.onAuthStateChanged(_fbAuth, async (user) => {
        if(user){
          // Validate domain
          if(ALLOWED_EMAIL_DOMAIN && user.email && !user.email.toLowerCase().endsWith(ALLOWED_EMAIL_DOMAIN.toLowerCase())){
            toast('That email isn\u2019t authorized for Realtor Radar','error');
            await fbSignOut();
            auth.user = null;
            render();
            return;
          }
          auth.user = user;
          // Load user's data + templates
          await loadTemplates();
          const loaded = await load();
          // Seed loSettings with email if blank
          if(!state.loSettings.email && user.email) state.loSettings.email = user.email;
          if(!loaded){ state.onboarded = false; }
          render();
        } else {
          auth.user = null;
          render();
        }
      });
    });
  };

  if(window.RR_FB){ start(); }
  else { window.addEventListener('rr-fb-ready', start, { once:true }); }

  bootCommon();
}

function bootCommon(){
  // Keyboard shortcut: Esc closes modal
  document.addEventListener('keydown', ev => {
    if(ev.key === 'Escape'){
      const modal = document.querySelector('.modal-shade');
      if(modal) closeModal();
    }
    if((ev.metaKey || ev.ctrlKey) && ev.key === 'k'){
      ev.preventDefault();
      if(state.view === 'pipeline') openAddAgentModal();
    }
  });

  // Console banner
  console.log('%cRealtor Radar v' + VERSION,
    'font-family:Lora,serif;font-size:18px;font-weight:600;color:#00818D;font-style:italic');
  console.log('%cMode: ' + auth.mode + (FIREBASE_ENABLED ? ' · Firebase' : ' · localStorage'),
    'font-family:monospace;font-size:11px;color:#6b6b6b');
}

// Boot
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
