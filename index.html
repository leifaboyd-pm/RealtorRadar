/* ========== AI LAYER ========== */
async function callAnthropic({ system, messages, maxTokens=2500, tools=null }){
  const key = getApiKey();
  if(!key){
    return { error:'no_key', text:'Add your Anthropic API key in Settings → AI to enable live AI features.' };
  }
  try {
    const body = {
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      ...(system ? { system } : {}),
      messages,
      ...(tools ? { tools } : {}),
    };
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'content-type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify(body),
    });
    if(!resp.ok){
      const errText = await resp.text();
      let errJson; try { errJson = JSON.parse(errText); } catch(e){}
      const msg = errJson?.error?.message || errText || `HTTP ${resp.status}`;
      return { error:'api', text: msg };
    }
    const data = await resp.json();
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');
    return { text, raw:data };
  } catch(e){
    return { error:'network', text: e.message || 'Network error calling Claude' };
  }
}

function parseJsonLoose(text){
  if(!text) return null;
  // Strip markdown code fences
  let cleaned = text.trim();
  cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '').trim();
  // Try direct parse
  try { return JSON.parse(cleaned); } catch(e){}
  // Try to find the first { ... } or [ ... ] block
  const objStart = cleaned.indexOf('{');
  const arrStart = cleaned.indexOf('[');
  const start = (objStart === -1) ? arrStart : (arrStart === -1 ? objStart : Math.min(objStart, arrStart));
  if(start === -1) return null;
  // Try to find balanced end
  const open = cleaned[start];
  const close = open === '{' ? '}' : ']';
  let depth = 0;
  for(let i = start; i < cleaned.length; i++){
    if(cleaned[i] === open) depth++;
    else if(cleaned[i] === close){
      depth--;
      if(depth === 0){
        const slice = cleaned.slice(start, i + 1);
        try { return JSON.parse(slice); } catch(e){}
      }
    }
  }
  // Last-ditch: try to balance ourselves
  try {
    const slice = cleaned.slice(start);
    return JSON.parse(slice + close.repeat(3));
  } catch(e){ return null; }
}

function brandFactsString(){
  return state.brandFacts.filter(Boolean).map((f,i) => `${i+1}. ${f}`).join('\n');
}
function voiceString(){
  const v = state.voice || {};

/* ========== SHARED HOOKS — find common ground between LO + agent ========== */

function loInterestsList(){
  const raw = state.loSettings?.interests || '';
  return raw.split(/[,\n;]+/).map(s => s.trim()).filter(Boolean);
}

function normalizeHook(s){
  return (s || '').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}

/* Returns array of {loInterest, agentHook} pairs that overlap */
function sharedHooks(agent){
  const interests = loInterestsList();
  if(!interests.length) return [];
  const hooks = agent.dossier?.personal_hooks || [];
  if(!hooks.length) return [];
  const matches = [];
  interests.forEach(interest => {
    const intNorm = normalizeHook(interest);
    if(intNorm.length < 4) return; // skip super-short tokens
    // Tokenize the interest into 1-3 word phrases
    const intTokens = intNorm.split(' ').filter(t => t.length >= 4);
    hooks.forEach(hook => {
      const hNorm = normalizeHook(hook);
      // Direct substring match on the full interest phrase
      if(hNorm.includes(intNorm)){
        matches.push({ loInterest: interest, agentHook: hook });
        return;
      }
      // Or any meaningful token from interest appears in hook
      const hitToken = intTokens.find(t => hNorm.includes(t));
      if(hitToken){
        matches.push({ loInterest: interest, agentHook: hook });
      }
    });
  });
  // Dedupe by agentHook
  const seen = new Set();
  return matches.filter(m => { if(seen.has(m.agentHook)) return false; seen.add(m.agentHook); return true; });
}

async function runMatch(criteria){
  if(!hasApiKey()){ toast('Add your Anthropic API key in Settings \u2192 AI','error'); return; }
  state.matchRun = {
    criteria,
    phase: 0,
    startedAt: Date.now(),
    results: null,
    error: null,
  };
  render();

  const phaseInt = setInterval(() => {
    if(!state.matchRun || state.matchRun.results || state.matchRun.error){ clearInterval(phaseInt); return; }
    if(state.matchRun.phase < MATCH_PHASES.length - 1){
      state.matchRun.phase++;
      const el = document.querySelector('.match-loading .phase-text');
      if(el){
        el.style.opacity = '0';
        setTimeout(() => {
          el.textContent = MATCH_PHASES[state.matchRun.phase];
          el.style.opacity = '1';
        }, 250);
      }
    }
  }, 6500);

  const elapsedInt = setInterval(() => {
    if(!state.matchRun || state.matchRun.results || state.matchRun.error){ clearInterval(elapsedInt); return; }
    const el = document.querySelector('.match-loading .elapsed');
    if(el) el.textContent = Math.floor((Date.now() - state.matchRun.startedAt)/1000) + 's';
  }, 1000);

  const prompt = buildMatchPrompt(criteria);
  const result = await callAnthropic({
    system: 'You are a research assistant. You MUST use web search to find real agents with public evidence of shared interests. Return only JSON. Never fabricate.',
    messages: [{ role:'user', content: prompt }],
    maxTokens: 6000,
    tools: [{ type:'web_search_20250305', name:'web_search' }],
  });

  clearInterval(phaseInt);
  clearInterval(elapsedInt);

  if(!state.matchRun) return; // user navigated away
  if(result.error){
    state.matchRun.error = result.text;
    render();
    return;
  }
  const parsed = parseJsonLoose(result.text);
  if(!parsed){
    state.matchRun.error = 'Couldn\u2019t parse output \u2014 try again';
    render();
    return;
  }
  state.matchRun.results = parsed;
  render();
}

const daysBetween = (a,b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const initials = n => (n||'?').split(/\s+/).filter(Boolean).map(p=>p[0]).slice(0,2).join('').toUpperCase();

const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* DOM helper */
function e(tag, props, ...children){
  // Accept ('div', 'classname', ...children) shorthand
  let p = props;
  if(typeof p === 'string'){ p = { class: p }; }
  p = p || {};
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(p)){
    if(v == null || v === false) continue;
    if(k === 'class' || k === 'className') el.className = v;
    else if(k === 'html') el.innerHTML = v;
    else if(k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k === 'style' && typeof v === 'object'){ for(const [sk,sv] of Object.entries(v)) el.style[sk] = sv; }
    else if(k === 'value' && (tag === 'input' || tag === 'textarea' || tag === 'select')) el.value = v;
    else if(k === 'checked' && tag === 'input') el.checked = !!v;
    else el.setAttribute(k, v);
  }
  for(const c of children.flat(Infinity)){
    if(c == null || c === false) continue;
    el.appendChild(c instanceof Node ? c : document.createTextNode(c));
  }
  return el;
}

/* ========== AGENT HELPERS ========== */
function activeAgent(){ return state.agents.find(a => a.id === state.activeAgentId); }
function cadenceForAgent(agent){
  if(!agent) return null;
  if(state.customCadences && state.customCadences[agent.cadence]) return state.customCadences[agent.cadence];
  return CADENCES[agent.cadence] || CADENCES.cold_solo;
}
function allCadences(){
  return [...Object.values(CADENCES), ...Object.values(state.customCadences || {})];
}
function cadenceById(id){
  return (state.customCadences && state.customCadences[id]) || CADENCES[id] || null;
}
function cadenceDaySpan(cad){
  if(!cad || !cad.steps || !cad.steps.length) return 0;
  return cad.steps.reduce((m,s) => Math.max(m, s.day || 0), 0);
}
function applyCadenceToAgent(agentId, cadenceId){
  const agent = state.agents.find(a => a.id === agentId);
  const cad = cadenceById(cadenceId);
  if(!agent || !cad) return false;
  agent.cadence = cadenceId;
  agent.cadenceStartedAt = new Date().toISOString().slice(0,10);
  agent.completedSteps = [];
  agent.activity = agent.activity || [];
  agent.activity.unshift({ at:new Date().toISOString(), kind:'cadence', text:'Applied cadence: ' + cad.name });
  save();
  return true;
}
function stepStartDate(agent){
  return agent.cadenceStartedAt || agent.createdAt;
}
function stepDueDate(agent, step){
  const start = new Date(stepStartDate(agent));
  start.setDate(start.getDate() + (step.day || 0));
  return start.toISOString().slice(0,10);
}
function stepStatus(agent, step){
  if((agent.completedSteps||[]).includes(step.id)) return 'done';
  const due = stepDueDate(agent, step);
  const days = daysBetween(today(), due);
  if(days < 0) return 'overdue';
  if(days === 0) return 'today';
  if(days <= 2) return 'soon';
  return 'future';
}
function nextStep(agent){
  const cad = cadenceForAgent(agent);
  if(!cad) return null;
  const completed = new Set(agent.completedSteps || []);
  for(const s of cad.steps){
    if(!completed.has(s.id)) return s;
  }
  return null;
}
function shouldShowSwitch(agent){
  const ACTIVE_STAGES = ['met','comarketing'];
  if(!ACTIVE_STAGES.includes(agent.stage)) return false;
  if(['active','nurture'].includes(agent.cadence)) return false;
  return true;
}
function advanceStage(agent, toStage){
  const currentIdx = STAGES.findIndex(s => s.id === agent.stage);
  const newIdx = STAGES.findIndex(s => s.id === toStage);
  // Forward only — never auto-regress
  if(newIdx > currentIdx && newIdx !== -1) agent.stage = toStage;
}
function tickStep(agentId, stepId){
  const agent = state.agents.find(a => a.id === agentId);
  if(!agent) return;
  agent.completedSteps = agent.completedSteps || [];
  if(agent.completedSteps.includes(stepId)){
    agent.completedSteps = agent.completedSteps.filter(s => s !== stepId);
  } else {
    agent.completedSteps.push(stepId);
    const cad = cadenceForAgent(agent);
    const step = cad?.steps.find(s => s.id === stepId);
    if(step?.stageHint) advanceStage(agent, step.stageHint);
  }
  agent.activity = agent.activity || [];
  agent.activity.unshift({ at: new Date().toISOString(), kind:'step', text:`Stepped: ${(cadenceForAgent(agent)?.steps.find(s=>s.id===stepId)?.action) || stepId}` });
  save();
  render();
}

function computePipelineStats(){
  let overdue = 0, dueToday = 0, partners = 0;
  for(const a of state.agents){
    if(a.stage === 'first_ref' || a.stage === 'repeat' || a.stage === 'regular' || a.stage === 'top') partners++;
    const ns = nextStep(a);
    if(!ns) continue;
    const st = stepStatus(a, ns);
    if(st === 'overdue') overdue++;
    if(st === 'today') dueToday++;
  }
  return { total: state.agents.length, overdue, dueToday, partners };
}

function pickContextualInsight(stats){
  if(state.agents.length === 0) return 'agents_are_source';
  // Day-of-week-aware: Monday morning = monday_calls warning
  const day = new Date().getDay();
  if(day === 1 && !state.dismissedInsights.includes('monday_calls')) return 'monday_calls';
  if(stats.overdue > 3 && !state.dismissedInsights.includes('responsiveness')) return 'responsiveness';
  if(stats.total > 0 && stats.partners === 0 && !state.dismissedInsights.includes('lead_with_value')) return 'lead_with_value';
  if(stats.partners > 0 && !state.dismissedInsights.includes('no_loyalty_assumption')) return 'no_loyalty_assumption';
  return 'social_warmup';
}

const RESEARCH_PHASES = [

  'Picking up recent listings and activity\u2026',

    e('h3',null, 'Researching ', e('em',null, a.name)),
    e('div','phase-text', RESEARCH_PHASES[phase]),
    e('div','progress-bar', e('div','fill')),
    e('div','meta',
      e('span','elapsed', elapsed + 's'),
      e('span',null,'\u00b7'),
      e('span',null,'usually 20\u201360 seconds'),

async function runResearch(agentId){
  const a = state.agents.find(x => x.id === agentId);
  if(!a) return;
  if(!hasApiKey()){ toast('Add your Anthropic API key in Settings \u2192 AI','error'); return; }

  // Initialize loading state
  a._researching = true;
  a._researchPhase = 0;
  a._researchStartedAt = Date.now();
  render();

  // Rotate phase text every ~7s
  const phaseInterval = setInterval(() => {
    if(!a._researching){ clearInterval(phaseInterval); return; }
    if(a._researchPhase < RESEARCH_PHASES.length - 1){
      a._researchPhase++;
      const phaseEl = document.querySelector('.research-loading .phase-text');
      if(phaseEl){
        phaseEl.style.opacity = '0';
        setTimeout(() => {
          phaseEl.textContent = RESEARCH_PHASES[a._researchPhase];
          phaseEl.style.opacity = '1';
        }, 250);
      }
    }
  }, 7000);

  // Update elapsed counter every second (DOM-only, no full re-render)
  const elapsedInterval = setInterval(() => {
    if(!a._researching){ clearInterval(elapsedInterval); return; }
    const el = document.querySelector('.research-loading .elapsed');
    if(el) el.textContent = Math.floor((Date.now() - a._researchStartedAt)/1000) + 's';
  }, 1000);

  const prompt = buildResearchPrompt(a);
  const result = await callAnthropic({
    system: 'You are a research analyst. You MUST use web search to find real information. Return only JSON, no markdown fences.',
    messages: [{ role:'user', content: prompt }],
    maxTokens: 8192,
    tools: [{ type:'web_search_20250305', name:'web_search' }],
  });

  a._researching = false;
  a._researchPhase = 0;
  clearInterval(phaseInterval);
  clearInterval(elapsedInterval);

  if(result.error){
    toast('Research failed: ' + result.text, 'error');
    render();
    return;
  }

  const parsed = parseJsonLoose(result.text);
  if(!parsed){
    toast('Couldn\u2019t parse research output \u2014 try again','error');
    render();
    return;
  }

  a.dossier = parsed;
  a.dossierFetchedAt = new Date().toISOString();
  a.activity.unshift({ at:new Date().toISOString(), kind:'research', text:'AI research dossier generated' });
  save();
  render();
  toast('Dossier ready','success');
  notify('Research ready', {
    sub: a.name + '\u2019s dossier is ready to view',
    onClick: function(){ openAgent(a.id); state.activeTab = 'research'; render(); },
  });
}

    ),

      e('button',{class:'btn btn-secondary btn-sm', onclick:()=>openApplyCadenceModal(a.id)}, 'Change cadence'),
    ),
  ));

  wrap.appendChild(e('div','cad-progress',
    e('div','bar', e('div',{class:'fill', style:{width:pct+'%'}})),
    e('div','lab', e('span',null, doneCount + ' of ' + total + ' steps done'), e('span',null, pct + '%')),
  ));

    const due = stepDueDate(a, ns);
    const days = daysBetween(today(), due);

      ? e('div',{class:'big', style:{fontSize:'30px'}}, 'Today')
      : e('div','big', status === 'overdue' ? String(Math.abs(days)) : String(days));
    const unitTxt = status === 'overdue' ? (Math.abs(days)===1?'day late':'days late')
      : (status === 'today' ? 'do it now' : (days===1?'day to go':'days to go'));
    const whenTxt = status === 'overdue' ? 'Overdue' : (status === 'today' ? 'On deck now' : ('Due ' + fmtDate(due)));

    const countEl = e('div','upnext-count ' + cls, bigNode, e('div','unit', unitTxt), e('div','when', whenTxt));
    const body = e('div','upnext-body',
      e('div','upnext-eyebrow',

        ns.optional ? e('span','opt','optional') : null,
      ),

      e('div','upnext-prompt', ns.prompt),
      ns.tasks && ns.tasks.length ? e('ul','upnext-tasks', ...ns.tasks.map(t=>e('li',null,t))) : null,
    );
    if(ns.insight && INSIGHTS[ns.insight]){

      body.appendChild(e('div',{class:'pb-insight', style:{marginTop:'12px'}}, e('b',null, ins.headline), ' \u2014 ' + ins.detail, e('em',null,'Source: ' + ins.source)));

    const actions = e('div','upnext-actions',
      e('button',{class:'btn btn-primary btn-sm', onclick:()=>tickStep(a.id, ns.id)}, '\u2713 Mark done & advance'),
    );
    if(['sms','email','ig_dm','linkedin','voice','note'].includes(ns.channel)){
      actions.appendChild(e('button',{class:'btn btn-secondary btn-sm', onclick:()=>{ state.draftFromStep = ns; state.activeTab='messages'; render(); }}, 'Draft message'));
    }
    if(ns.optional){
      actions.appendChild(e('button',{class:'btn btn-ghost btn-sm', onclick:()=>tickStep(a.id, ns.id)}, 'Skip'));
    }
    body.appendChild(actions);
    wrap.appendChild(e('div', 'upnext ' + cls, e('div','upnext-strip', countEl, body)));
  } else {
    wrap.appendChild(e('div','upnext-done',
      e('div','mk','\u2713'),
      e('div',null,
        e('h3',null,'Cadence complete.'),
        e('p',null, total + ' steps done. Keep the relationship warm \u2014 the Long-Term Nurture rhythm keeps you top of mind without starting over.'),
        e('div',{style:{marginTop:'12px',display:'flex',gap:'8px',flexWrap:'wrap'}},
          a.cadence!=='nurture' ? e('button',{class:'btn btn-gold btn-sm', onclick:()=>{ applyCadenceToAgent(a.id,'nurture'); render(); toast('Switched to Nurture','success'); }}, 'Switch to Nurture') : null,
          e('button',{class:'btn btn-secondary btn-sm', onclick:()=>openApplyCadenceModal(a.id)}, 'Change cadence'),
        ),
      ),
    ));
  }

  // View full cadence toggle
  wrap.appendChild(e('div','cad-toolbar',
    e('button',{class:'btn btn-ghost btn-sm', onclick:()=>{ a._cadFull = !a._cadFull; render(); }}, a._cadFull ? 'Hide full cadence \u25B4' : 'View full cadence \u25BE'),
    cad.sub ? e('span',{style:{fontFamily:'var(--cond)',fontSize:'11px',letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)'}}, cad.sub) : null,
  ));

  if(a._cadFull){
    const full = e('div','cad-full');
    const tl = e('div','cad-timeline');
    steps.forEach(s=>{
      const isDone = (a.completedSteps||[]).includes(s.id);
      const isCurrent = ns && s.id === ns.id;
      const st = e('div','ct-step ' + (isDone?'done':'') + (isCurrent?' current':''));
      st.appendChild(e('div',{class:'ct-dot', title:'Toggle complete', onclick:()=>tickStep(a.id, s.id)}, isDone?'\u2713':''));
      st.appendChild(e('div','ct-meta',
        e('span','d', 'Day ' + s.day),

      ));
      st.appendChild(e('div','ct-name', s.action));
      st.appendChild(e('div','ct-prompt', s.prompt));
      tl.appendChild(st);
    });
    full.appendChild(tl);
    wrap.appendChild(full);
  }

  return wrap;
}

const KNOWN_CHANNELS = ['sms','email','ig_dm','linkedin','voice','call','inperson','note','social'];

function cadenceMetaPills(cad){
  const channels = [];
  (cad.steps||[]).forEach(s => { const c = chLabel(s.channel); if(channels.indexOf(c) === -1) channels.push(c); });

    e('span','tpl-pill accent', (cad.steps||[]).length + ' steps'),

  ];
  channels.slice(0,4).forEach(c => pills.push(e('span','tpl-pill', c)));
  return pills;
}

function buildCustomCadencePrompt(a){
  const d = a.dossier || {};
  const lines = [];
  lines.push('Agent: ' + a.name);
  if(a.brokerage) lines.push('Brokerage: ' + a.brokerage);
  if(a.area) lines.push('Area: ' + a.area);
  lines.push('Side focus: ' + (a.side||'unknown') + ' | Tier: ' + (a.tier||'unknown') + ' | Stage: ' + (STAGES.find(s=>s.id===a.stage)?.name||a.stage));
  if(a.existingPartner) lines.push('This is an EXISTING referral partner.');
  if(d.niche) lines.push('Niche: ' + d.niche);
  if(d.production) lines.push('Production: ' + d.production);
  if(d.current_lenders) lines.push('Current lender(s): ' + d.current_lenders);
  if(Array.isArray(d.personal_hooks) && d.personal_hooks.length) lines.push('Personal hooks: ' + d.personal_hooks.join('; '));
  if(Array.isArray(d.social_presence) && d.social_presence.length) lines.push('Social presence: ' + d.social_presence.join('; '));
  if(Array.isArray(d.value_fits) && d.value_fits.length) lines.push('Value fits: ' + d.value_fits.join('; '));
  if(Array.isArray(d.outreach_angles) && d.outreach_angles.length) lines.push('Outreach angles: ' + d.outreach_angles.join('; '));
  if(Array.isArray(d.do_nots) && d.do_nots.length) lines.push('DO NOT: ' + d.do_nots.join('; '));

  return `You are an expert mortgage business-development coach. Design a CUSTOM outreach cadence for a Loan Officer at Partners Mortgage to court ONE specific real estate agent into a referral partnership.

Tailor everything to THIS agent based on what we know. Read their personality and preferences from the research and adapt:
- If they are warm/social/active online, lean into DMs, social, voice notes, in-person.
- If they are reserved/formal/high-volume, lean into concise email, scheduled calls, written proposals, fewer touches.
- Respect every DO NOT. Reference their real niche, hooks, and what they value. Lead with value, never a rate pitch.
- Avoid Monday-morning calls. Space touches so it never feels pushy.

What we know:
${lines.join('\n')}

Produce a cadence of 6 to 8 steps spanning roughly 18 to 22 days (same scale as a standard template). Each step has a day offset from day 0, a channel, a clear action title, and a specific prompt written FOR this agent (not generic).

Channels MUST be one of exactly: sms, email, ig_dm, linkedin, voice, call, inperson, note, social.

Return ONLY JSON, no markdown fences, exactly this shape:
{
  "name": "Custom — <agent first name> (<one-word vibe, e.g. Warm / Formal / High-touch>)",
  "sub": "One sentence on why this cadence fits this agent.",
  "steps": [
    { "day": 0, "channel": "social", "action": "Short action title", "prompt": "Specific instruction referencing this agent.", "optional": false }
  ]
}`;
}

async function generateCustomCadence(agentId, onDone){
  const a = state.agents.find(x=>x.id===agentId);
  if(!a){ onDone && onDone(null); return; }
  if(!hasApiKey()){ toast('Add an Anthropic API key in Settings \u2192 AI','error'); onDone && onDone(null); return; }
  const res = await callAnthropic({
    system: 'You design tailored outreach cadences for mortgage loan officers. Return only JSON, no markdown fences.',
    messages: [{ role:'user', content: buildCustomCadencePrompt(a) }],
    maxTokens: 3000,
  });
  if(res.error){ toast('Generation failed: ' + res.text,'error'); onDone && onDone(null); return; }
  const parsed = parseJsonLoose(res.text);
  if(!parsed || !Array.isArray(parsed.steps) || !parsed.steps.length){ toast('Couldn\u2019t parse the cadence \u2014 try again','error'); onDone && onDone(null); return; }
  const id = 'cust_' + uid();
  const cad = {
    id,
    name: parsed.name || ('Custom \u2014 ' + a.name),
    sub: parsed.sub || ('Tailored to ' + a.name),
    custom: true,
    forAgent: a.name,
    steps: parsed.steps.map((s,i)=>({
      id: id + '_' + i,
      day: Number(s.day) || 0,
      channel: validChannel(s.channel),
      action: s.action || ('Touch ' + (i+1)),
      prompt: s.prompt || '',
      tasks: Array.isArray(s.tasks) && s.tasks.length ? s.tasks : undefined,
      optional: !!s.optional,
    })).sort((x,y)=>x.day-y.day),
  };
  onDone && onDone(cad);
}

  // Value
  controls.appendChild(e('div','field',
    e('label',null,'Value being offered (optional)'),
    e('input',{type:'text', class:'fi', placeholder:'e.g. financing-fit on their new listing', value: a._draft.valueOffer, oninput: ev => a._draft.valueOffer = ev.target.value }),
  ));

  // Note
  controls.appendChild(e('div','field',
    e('label',null,'Anything else'),
    e('textarea',{class:'fi', placeholder:'Context the AI should know: ongoing convo, relationship history, anything to weave in or avoid…', oninput: ev => a._draft.note = ev.target.value}, a._draft.note),
  ));

  // Monday warning
  const day = new Date().getDay();
  if(day === 1 && a._draft.channel === 'call'){
    controls.appendChild(insightCard('monday_calls',{inline:true, dismissible:false}));
  }

  controls.appendChild(e('button',{class:'btn btn-primary', style:{marginTop:'8px'}, onclick:()=>generateMessage(a.id)}, 'Generate variants'));

  grid.appendChild(controls);

  // Right: output
  const output = e('div','draft-output');
  if(a._generating){
    output.appendChild(e('div','panel', e('div',{style:{padding:'30px',textAlign:'center',color:'var(--muted)'}},
      e('span','spinner'), ' Generating in your voice…'),
    ));
  } else if(a._lastDraft){
    const d = a._lastDraft;
    if(d.subject) output.appendChild(e('div','field', e('label',null,'Subject'), e('input',{class:'fi', value:d.subject, readonly:true})));
    output.appendChild(renderVariant('Polished', d.polished));
    output.appendChild(renderVariant('Short', d.short));
    output.appendChild(renderVariant('Casual', d.casual));
    if(d.rationale){
      output.appendChild(e('div',{class:'insight insight-inline', style:{marginTop:'4px'}},
        e('span','bulb','WHY'),
        e('div','body', d.rationale),
      ));
    }
  } else {
    output.appendChild(e('div',{style:{padding:'40px 30px',textAlign:'center',color:'var(--muted)',fontStyle:'italic',background:'var(--paper)',border:'1px dashed var(--rule-strong)',borderRadius:'10px'}},
      'Fill in the angle and a value to offer, then generate three variants.',
    ));
  }

  // Past messages log
  if(a.messages?.length){
    output.appendChild(e('div',{style:{marginTop:'24px'}},
      e('div','panel-eyebrow','Past drafts'),
      ...a.messages.slice(0,5).map(m => e('div',{class:'variant', style:{marginTop:'8px'}},
        e('div','variant-head',
          e('span',null, fmtDate(m.at) + ' · ' + chLabel(m.channel)),
        ),
        e('div','variant-text', m.polished || m.text || '—'),
      )),
    ));
  }

  grid.appendChild(output);
  wrap.appendChild(grid);
  return wrap;
}
function renderVariant(label, text){
  return e('div','variant',
    e('div','variant-head', e('span',null, label)),
    e('div','variant-text', text || '—'),
    e('div','copy-row',
      e('button',{class:'btn btn-secondary btn-sm', onclick:()=>{
        navigator.clipboard.writeText(text || '').then(()=>toast('Copied','success'));
      }}, 'Copy'),
    ),
  );
}

async function generateMessage(agentId){
  const a = state.agents.find(x => x.id === agentId);
  if(!a) return;
  if(!hasApiKey()){ toast('Add your Anthropic API key in Settings → AI','error'); return; }
  if(!a._draft.angle && !a._draft.note){
    if(!confirm('No angle or context entered — output will be generic. Continue anyway?')) return;
  }
  a._generating = true; a._lastDraft = null;
  render();

  const prompt = buildMessagePrompt(a, a._draft);
  const result = await callAnthropic({
    system: 'You write outreach messages from loan officers to real estate agents. Specific, voice-matched, value-first. Return only JSON.',
    messages: [{ role:'user', content: prompt }],
    maxTokens: 2000,
  });
  a._generating = false;

  if(result.error){ toast('Generation failed: ' + result.text, 'error'); render(); return; }
  const parsed = parseJsonLoose(result.text);
  if(!parsed){ toast('Couldn\u2019t parse output — try again','error'); render(); return; }

  a._lastDraft = parsed;
  a.messages = a.messages || [];
  a.messages.unshift({
    at: new Date().toISOString(),
    channel: a._draft.channel,
    tone: a._draft.tone,
    angle: a._draft.angle,
    polished: parsed.polished,
    short: parsed.short,
    casual: parsed.casual,
    subject: parsed.subject,
  });
  a.activity.unshift({ at:new Date().toISOString(), kind:'draft', text:`Drafted ${chLabel(a._draft.channel)} variants` });
  save();
  render();
  toast('3 variants ready','success');
}

async function generateDeliverable(agentId, kind){
  const a = state.agents.find(x => x.id === agentId);
  if(!a) return;
  if(!hasApiKey()){ toast('Add your Anthropic API key in Settings \u2192 AI','error'); return; }
  if(!a.selectedValues?.length){ toast('Select at least one service from the menu first','error'); return; }

  const selected = state.valueMenu.filter(v => a.selectedValues.includes(v.id));
  const prompt = buildDeliverablePrompt(a, kind, selected);

  // Initialize loading state
  a._generatingDeliv = kind;
  a._delivPhase = 0;
  a._delivStartedAt = Date.now();
  render();

  const phases = DELIV_PHASES[kind] || ['Composing\u2026','Drafting\u2026','Finalizing\u2026'];

  // Phase rotation
  const phaseInterval = setInterval(() => {
    if(a._generatingDeliv !== kind){ clearInterval(phaseInterval); return; }
    if(a._delivPhase < phases.length - 1){
      a._delivPhase++;
      const phaseEl = document.querySelector('.research-loading.deliv-loading .phase-text');
      if(phaseEl){
        phaseEl.style.opacity = '0';
        setTimeout(() => {
          phaseEl.textContent = phases[a._delivPhase];
          phaseEl.style.opacity = '1';
        }, 250);
      }
    }
  }, 6000);

  // Elapsed counter
  const elapsedInterval = setInterval(() => {
    if(a._generatingDeliv !== kind){ clearInterval(elapsedInterval); return; }
    const el = document.querySelector('.research-loading.deliv-loading .elapsed');
    if(el) el.textContent = Math.floor((Date.now() - a._delivStartedAt)/1000) + 's';
  }, 1000);

  const result = await callAnthropic({
    system: 'You craft tailored partnership artifacts between a loan officer and a real estate agent. Specific, agent-aware, no boilerplate. Return only JSON.',
    messages: [{ role:'user', content: prompt }],
    maxTokens: 4000,
  });

  a._generatingDeliv = null;
  a._delivPhase = 0;
  clearInterval(phaseInterval);
  clearInterval(elapsedInterval);

  if(result.error){ toast('Generation failed: ' + result.text, 'error'); render(); return; }
  const parsed = parseJsonLoose(result.text);
  if(!parsed){ toast('Couldn\u2019t parse output \u2014 try again','error'); render(); return; }

  a.deliverables = a.deliverables || {};
  a.deliverables[kind] = { ...parsed, videoUrl: a.deliverables[kind]?.videoUrl || '', generatedAt: new Date().toISOString() };
  a.activity.unshift({ at:new Date().toISOString(), kind:'deliverable', text:'Generated ' + (kind==='plan'?'Partnership Plan':kind==='menu'?'Co-Marketing Menu':'Value Deck') });
  save();
  render();
  toast('Deliverable ready','success');
  openDeliverableViewer(agentId, kind);
}

  const phase = a._delivPhase || 0;
  const elapsed = a._delivStartedAt ? Math.floor((Date.now() - a._delivStartedAt)/1000) : 0;
  const phases = DELIV_PHASES[kind] || [];
  const label = kind==='plan' ? 'Partnership Plan' : kind==='menu' ? 'Co-Marketing Menu' : 'Custom Value Deck';

/* ========== DELIVERABLE EDITORIAL VIEWER ========== */

function openDeliverableViewer(agentId, kind){
  state.viewingDeliverable = { agentId, kind, editing: false };
  render();
  window.scrollTo(0,0);
}
function closeDeliverableViewer(){
  state.viewingDeliverable = null;
  render();
}

/* Parse YouTube/Vimeo URL → iframe embed HTML */
/* Pull a clean dollar figure or range from arbitrary AI-generated text */
function extractDollarFigure(str){
  if(!str) return '';
  // $X,XXX – $X,XXX or $X-$Y (handle different dashes)
  let m = str.match(/\$\s?[\d,]+(?:\.\d+)?\s*[\u2013\u2014\-]\s*\$?\s?[\d,]+(?:\.\d+)?[KMkm]?/);
  if(m) return m[0].replace(/\s+/g,'').replace(/[\-]/, '\u2013');
  // Single $-amount with optional K/M suffix
  m = str.match(/\$\s?[\d,]+(?:\.\d+)?\s?[KMkm]?/);
  if(m) return m[0].replace(/\s+/g,'').toUpperCase().replace('$','$');
  // No $ but has K/M suffix
  m = str.match(/\d[\d,]*(?:\.\d+)?\s*[KMkm]/);
  if(m) return '$' + m[0].replace(/\s+/g,'').toUpperCase();
  return '';
}

/* Reusable editorial contact card — uses photo if set, else initials; appends italic Lora interests line */
function buildContactCardHTML(lo){
  lo = lo || state.loSettings || {};
  const avatar = lo.photoDataUrl
    ? '<div class="avatar"><img src="' + lo.photoDataUrl + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block"></div>'
    : '<div class="avatar">' + esc(initials(lo.name || 'PM')) + '</div>';
  let details = '';
  if(lo.email) details += '<div><span class="lab">Email</span>' + esc(lo.email) + '</div>';
  if(lo.phone) details += '<div><span class="lab">Cell</span>' + esc(lo.phone) + '</div>';
  if(lo.nmls)  details += '<div><span class="lab">NMLS</span>' + esc(lo.nmls) + '</div>';
  // Italic Lora interests line — pulls first 3 interests from LO settings as a warm personal touch
  let interestsLine = '';
  if(lo.interests){
    const list = lo.interests.split(/[,\n;]+/).map(s => s.trim()).filter(Boolean).slice(0,3);
    if(list.length){
      interestsLine = '<div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,215,138,.25);font-family:\'Lora\',Georgia,serif;font-style:italic;font-size:13.5px;color:rgba(255,255,255,.7);line-height:1.5">When I\u2019m not closing loans \u2014 ' + esc(list.join(', ')) + '.</div>';
    }
  }
  return '<div class="b-contact">' + avatar +
    '<div>' +
      '<div class="role">Your dedicated loan officer</div>' +
      '<div class="name">' + esc(lo.name || 'Partners Mortgage') + '</div>' +
      '<div class="details">' + details + '</div>' +
      interestsLine +
    '</div>' +
  '</div>';
}

function videoEmbedHtml(url){
  if(!url) return '';
  const u = url.trim();
  // YouTube
  let m = u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m) return '<iframe src="https://www.youtube.com/embed/' + m[1] + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  // Vimeo
  m = u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m) return '<iframe src="https://player.vimeo.com/video/' + m[1] + '" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>';
  // Loom
  m = u.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
  if(m) return '<iframe src="https://www.loom.com/embed/' + m[1] + '" allowfullscreen></iframe>';
  return '';
}

function renderDeliverableViewer(){
  const v = state.viewingDeliverable;
  if(!v) return null;
  const a = state.agents.find(x => x.id === v.agentId);
  if(!a) return null;
  const d = a.deliverables?.[v.kind];
  if(!d) return null;

  const wrap = document.createElement('div');
  wrap.className = 'deliv-view' + (v.editing ? ' editing' : '');

  // Action bar
  const bar = document.createElement('div');
  bar.className = 'deliv-actions';
  bar.innerHTML = `
    <div class="left">
      <button class="back" id="dv-back">\u2190 Back to ${esc(a.name)}</button>
      <span class="title-mini">\u00b7 ${esc(v.kind==='plan'?'Partnership Plan':v.kind==='menu'?'Co-Marketing Menu':'Custom Value Deck')}</span>
    </div>
    <div class="right">
      <button class="deliv-btn" id="dv-video">${d.videoUrl ? '\u270e Edit video' : '+ Add video'}</button>
      <button class="deliv-btn" id="dv-edit">${v.editing ? '\u2713 Done editing' : '\u270e Edit text'}</button>
      <button class="deliv-btn" id="dv-regen">\u21bb Regenerate</button>
      <button class="deliv-btn deliv-btn-primary" id="dv-print">Print / PDF</button>
      <button class="deliv-btn deliv-btn-gold" id="dv-download">\u2b07 Download HTML</button>
    </div>`;
  wrap.appendChild(bar);

  // Editorial content
  const content = document.createElement('div');
  content.innerHTML = buildEditorialHTML(a, v.kind, d, { embedded:true });
  wrap.appendChild(content);

  // Wire actions
  bar.querySelector('#dv-back').addEventListener('click', closeDeliverableViewer);
  bar.querySelector('#dv-edit').addEventListener('click', () => {
    // Save edits if exiting edit mode
    if(v.editing){
      saveInlineEdits(a, v.kind);
    }
    v.editing = !v.editing;
    render();
  });
  bar.querySelector('#dv-video').addEventListener('click', () => openVideoUrlModal(a, v.kind));
  bar.querySelector('#dv-regen').addEventListener('click', () => {
    if(!confirm('Regenerate this deliverable? Current text and video will be replaced.')) return;
    closeDeliverableViewer();
    generateDeliverable(a.id, v.kind);
  });
  bar.querySelector('#dv-print').addEventListener('click', () => printEditorialDeliverable(a, v.kind, d));
  bar.querySelector('#dv-download').addEventListener('click', () => downloadStandaloneHTML(a, v.kind, d));

  return wrap;
}

function saveInlineEdits(a, kind){
  // Walk the .deliv-view content and persist any contenteditable edits back to the data
  const d = a.deliverables?.[kind];
  if(!d) return;
  document.querySelectorAll('.deliv-view [contenteditable="true"][data-path]').forEach(el => {
    const path = el.getAttribute('data-path');
    const newText = el.innerText.trim();
    setByPath(d, path, newText);
  });
  save();
  toast('Edits saved', 'success');
}
function setByPath(obj, path, value){
  const parts = path.split('.');
  let cur = obj;
  for(let i=0; i<parts.length-1; i++){
    const p = parts[i];
    // Handle array index syntax: foo[0]
    const m = p.match(/^([^\[]+)\[(\d+)\]$/);
    if(m){ cur = cur[m[1]]?.[parseInt(m[2])]; }
    else { cur = cur[p]; }
    if(!cur) return;
  }
  const last = parts[parts.length-1];
  const mm = last.match(/^([^\[]+)\[(\d+)\]$/);
  if(mm){ cur[mm[1]][parseInt(mm[2])] = value; }
  else { cur[last] = value; }
}

function openVideoUrlModal(a, kind){
  const d = a.deliverables?.[kind];
  if(!d) return;
  const content = e('div',null);
  content.appendChild(e('div','modal-head',
    e('div','title','Embed a ', e('em',null,'video')),

  body.appendChild(e('div',{style:{fontSize:'13px',color:'var(--muted)',lineHeight:'1.6',marginBottom:'14px'}},
    'Paste a YouTube, Vimeo, or Loom URL. The video will embed in the deliverable and in the downloaded HTML.',
  ));
  body.appendChild(e('div','field',
    e('label',null,'Video URL'),
    e('input',{type:'url', class:'fi', id:'video-url-input', placeholder:'https://www.youtube.com/watch?v=\u2026', value: d.videoUrl || ''}),
    e('div','hint','Supports YouTube, Vimeo, Loom. Leave blank to remove.'),

  content.appendChild(body);

    }}, 'Save'),
  ));
  openModal(content);
}

function getEditorialCSSForExport(){
  // Pull the .deliv-view CSS rules from our embedded stylesheet — for the standalone export

function downloadStandaloneHTML(a, kind, d){
  const html = buildStandaloneHTML(a, kind, d);
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const titleMap = { plan:'partnership-plan', menu:'co-marketing-menu', deck:'value-deck' };
  const fname = (a.name || 'deliverable').toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + titleMap[kind] + '.html';
  const link = document.createElement('a');
  link.href = url;
  link.download = fname;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Downloaded ' + fname, 'success');
}

function printEditorialDeliverable(a, kind, d){
  const html = buildStandaloneHTML(a, kind, d);
  const win = window.open('', '_blank');
  if(!win){ toast('Pop-up blocked \u2014 enable pop-ups and try again','error'); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

function dirFilteredAgents(){
  const q = (state.dirSearch||'').toLowerCase();
  let list = state.agents.filter(a=>{
    if(state.dirTier!=='all' && a.tier!==state.dirTier) return false;
    if(state.dirSide!=='all'){
      if(state.dirSide==='listing' && !(a.side==='listing'||a.side==='both')) return false;
      if(state.dirSide==='buyer' && !(a.side==='buyer'||a.side==='both')) return false;
      if(state.dirSide==='both' && a.side!=='both') return false;
    }
    if(state.dirStage!=='all' && a.stage!==state.dirStage) return false;
    const isPartner = ['first_ref','repeat','regular','top'].includes(a.stage);
    if(state.dirPartner==='partners' && !isPartner) return false;
    if(state.dirPartner==='prospects' && isPartner) return false;
    if(q){
      const hay = `${a.name} ${a.brokerage} ${a.area} ${a.neighborhoods}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const tierRank = t => t==='A'?0:t==='B'?1:t==='C'?2:3;
  const stageRank = s => STAGES.findIndex(x=>x.id===s);
  const lastTouch = a => (a.activity && a.activity[0] && a.activity[0].at) || a.createdAt;
  const sort = state.dirSort||'recent';
  list = list.slice();
  if(sort==='name') list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(sort==='tier') list.sort((a,b)=>tierRank(a.tier)-tierRank(b.tier));
  else if(sort==='stage') list.sort((a,b)=>stageRank(b.stage)-stageRank(a.stage));
  else if(sort==='due') list.sort((a,b)=>{
    const da = (()=>{ const n=nextStep(a); return n?stepDueDate(a,n):'9999-12-31'; })();
    const db = (()=>{ const n=nextStep(b); return n?stepDueDate(b,n):'9999-12-31'; })();
    return da.localeCompare(db);
  });
  else list.sort((a,b)=> String(lastTouch(b)).localeCompare(String(lastTouch(a))));
  return list;
}

function renderDirRows(host){
  host.innerHTML='';
  const list = dirFilteredAgents();
  if(!list.length){
    host.appendChild(e('div','dir-empty','No agents match these filters.'));
    return;
  }
  list.forEach(a=>{
    const ns = nextStep(a);
    let nextEl;
    if(ns){
      const st = stepStatus(a, ns);
      const dueCls = st==='overdue'?'overdue':(st==='today'?'today':'');
      const dueTxt = st==='overdue'?'Overdue':(st==='today'?'Today':(st==='soon'?('In '+daysBetween(today(),stepDueDate(a,ns))+'d'):('Day '+ns.day)));
      nextEl = e('div','dir-next', e('div','due '+dueCls, dueTxt), e('div',null, ns.action.length>34?ns.action.slice(0,32)+'\u2026':ns.action));
    } else {
      nextEl = e('div','dir-next', e('div',{style:{color:'var(--muted)',fontStyle:'italic'}}, 'Cadence complete'));
    }
    const contact = e('div','dir-contact');
    if(a.phone) contact.appendChild(e('a',{href:'tel:'+a.phone, title:a.phone, onclick:ev=>ev.stopPropagation()}, '\u260E'));
    if(a.email) contact.appendChild(e('a',{href:'mailto:'+a.email, title:a.email, onclick:ev=>ev.stopPropagation()}, '\u2709'));
    if(a.instagram) contact.appendChild(e('a',{href:(a.instagram.indexOf('http')===0?a.instagram:('https://instagram.com/'+a.instagram.replace(/^@/,''))), target:'_blank', rel:'noopener', title:'Instagram', onclick:ev=>ev.stopPropagation()}, '\u25C9'));
    if(!contact.children.length) contact.appendChild(e('span','none','\u2014'));

    const cad = cadenceById(a.cadence);
    host.appendChild(e('div',{class:'dir-row', onclick:()=>openAgent(a.id)},
      e('div','dir-who',
        e('div','dir-av', initials(a.name)),
        e('div',{style:{minWidth:'0'}},
          e('div','nm', a.name, a.existingPartner?e('span',{title:'Existing partner', style:{color:'var(--gold-2)',marginLeft:'5px'}},'\u2605'):null),
          e('div','br', a.brokerage||'\u2014'),
        ),
      ),
      contact,
      e('div','dir-col-area dir-cell-sub', a.area||'\u2014'),
      e('div',null, e('span','dir-badge dir-tier'+a.tier, 'Tier '+a.tier)),
      e('div','dir-col-cadence dir-cell-sub', cad ? cad.name.replace(/—.*/,'').trim() : a.cadence),
      e('div','dir-col-next', nextEl),
    ));
  });
}

// Photo upload: read file, resize via canvas to max 400x400, store as JPEG data URL
function handleLoPhotoUpload(file){
  if(!file) return;
  if(!/^image\//.test(file.type)){ toast('Please choose an image file','error'); return; }
  if(file.size > 8 * 1024 * 1024){ toast('Image too large \u2014 keep under 8 MB','error'); return; }
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const MAX = 400;
      let w = img.width, h = img.height;
      // Center-crop to square first, then scale down
      const side = Math.min(w, h);
      const sx = (w - side) / 2;
      const sy = (h - side) / 2;
      const canvas = document.createElement('canvas');
      canvas.width = MAX;
      canvas.height = MAX;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, side, side, 0, 0, MAX, MAX);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      state.loSettings.photoDataUrl = dataUrl;
      save();
      render();
      toast('Photo saved \u2014 will appear on all deliverables','success');
    };
    img.onerror = function(){ toast('Couldn\u2019t read that image \u2014 try a JPEG or PNG','error'); };
    img.src = ev.target.result;
  };
  reader.onerror = function(){ toast('File read failed','error'); };
  reader.readAsDataURL(file);
}

function openAddAgentModalPrefilled(m){
  // Open add modal, then programmatically fill values after a frame
  openAddAgentModal();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.modal-body input, .modal-body textarea');
    if(!inputs.length) return;
    // Find by placeholder
    const setByPh = (text, val) => {
      inputs.forEach(inp => { if((inp.placeholder||'').toLowerCase().includes(text)) { inp.value = val; inp.dispatchEvent(new Event('input', { bubbles: true })); } });
    };
    setByPh('jane realtor', m.name || '');
    setByPh('compass', m.brokerage || '');
    setByPh('san diego', m.area || '');
    setByPh('ig handle', m.instagram || '');
    setByPh('linkedin url', m.linkedin || '');
    setByPh('where do they work', '');
    // Side chip
    if(m.side === 'listing' || m.side === 'buyer' || m.side === 'both'){
      document.querySelectorAll('.chip[data-side]').forEach(c => c.classList.remove('on'));
      const sideChip = document.querySelector('.chip[data-side="' + m.side + '"]');
      if(sideChip) sideChip.click();
    }
    // Tier chip
    if(['A','B','C'].includes(m.tier_estimate)){
      document.querySelectorAll('.chip[data-tier]').forEach(c => c.classList.remove('on'));
      const tierChip = document.querySelector('.chip[data-tier="' + m.tier_estimate + '"]');
      if(tierChip) tierChip.click();
    }
    // Add a note line about the shared interest
    const noteTa = [...inputs].find(inp => inp.tagName === 'TEXTAREA' && (inp.placeholder || '').toLowerCase().includes('worth remembering'));
    if(noteTa){
      noteTa.value = 'Realtor Match: shares "' + (m.matched_interest || '') + '". ' + (m.why_fit || '');
      noteTa.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }, 60);
}

function parseCsv(text){
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if(lines.length === 0) return { agents:[], errors:['Empty'] };
  // Detect header
  const first = lines[0].toLowerCase();
  const hasHeader = first.includes('name') && first.includes('brokerage');
  let headers, dataLines;
  if(hasHeader){
    headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    dataLines = lines.slice(1);
  } else {
    headers = ['name','brokerage','area','side','tier','luxury','phone','email','instagram','linkedin','website','transactions_yr','avg_price','neighborhoods'];
    dataLines = lines;
  }
  const agents = [];
  const errors = [];
  dataLines.forEach((line, i) => {
    // simple CSV parse (no quoted commas — keep it simple)
    const cells = line.split(',').map(c => c.trim());
    if(!cells[0]){ return; }
    const obj = {};
    headers.forEach((h, j) => { if(cells[j]) obj[h] = cells[j]; });
    const data = {
      name: obj.name,
      brokerage: obj.brokerage || '',
      area: obj.area || '',
      side: ['buyer','listing','both'].includes(obj.side) ? obj.side : 'buyer',
      tier: ['A','B','C'].includes(obj.tier?.toUpperCase?.()) ? obj.tier.toUpperCase() : 'C',
      luxury: obj.luxury === 'true' || obj.luxury === 'TRUE' || obj.luxury === '1',
      phone: obj.phone || '',
      email: obj.email || '',
      instagram: obj.instagram || '',
      linkedin: obj.linkedin || '',
      website: obj.website || '',
      transactionsYr: obj.transactions_yr ? parseInt(obj.transactions_yr) : null,
      avgPrice: obj.avg_price || null,
      neighborhoods: obj.neighborhoods || '',
    };
    if(!data.name){ errors.push(`Row ${i+1}: missing name`); return; }
    agents.push(data);
  });
  return { agents, errors };
}

function fmtDur(ms){
  var s = Math.max(0, Math.round(ms/1000));

  return m + 'm' + (r ? (' ' + r + 's') : '');
}

function makeTagInput(arr, placeholder){

    Array.prototype.slice.call(wrap.querySelectorAll('.tag-chip')).forEach(function(c){ c.remove(); });

    var v = input.value.trim();

    input.value = ''; save(); renderChips(); input.focus();
  }
  input.addEventListener('keydown', function(ev){ if(ev.key === 'Enter' || ev.key === ','){ ev.preventDefault(); add(); } });

  wrap.appendChild(input); renderChips();

async function resolveLocation(){
  var d = state.discover;
  var place = (d.place || '').trim();
  if(!place || place === d._resolvedFor || !hasApiKey()){ save(); return; }
  _discoverResolving = true; d._resolveErr = false; render();

  _discoverResolving = false;

  else { d._resolveErr = true; }

async function enrichPool(items, conc, worker){
  var i = 0;
  async function next(){ while(i < items.length){ var idx = i++; await worker(items[idx], idx); } }
  var runners = [];

  await Promise.all(runners);

async function runDiscover(){

  var count = Math.max(3, Math.min(15, parseInt(d.count,10)||8));

  _discoverStartTs=Date.now();

  var scanRes = await callAnthropic({
    system: 'You are a real estate relationship-research analyst. You MUST use web search to find REAL, currently active real estate agents. Never fabricate people, brokerages, or details. Return only a JSON array, no markdown fences.',
    messages: [{ role:'user', content: buildDiscoverPrompt(count) }],
    maxTokens: 8192,
    tools: [{ type:'web_search_20250305', name:'web_search' }],
  });
  if(scanRes.error){ finishDiscoverError(scanRes.text); return; }
  if(runId !== _discoverRunId) return;
  var arr = parseJsonLoose(scanRes.text);
  if(!Array.isArray(arr)){
    if(arr && Array.isArray(arr.results)) arr = arr.results;

    else { finishDiscoverError('Could not read the candidate list \u2014 try again.'); return; }
  }

  var picks = arr.filter(function(r){ return r.match_score >= minScore; }).sort(function(a,b){ return b.match_score - a.match_score; }).slice(0, count);

    var soc = cand.social || {};

    if(dr.dossier){ cand.dossier = dr.dossier; cand._enriched = true; }
    else { cand._enrichErr = true; }
    _discoverEnrichDone++;
    _discoverProgress = 25 + (_discoverEnrichDone/_discoverEnrichTotal) * 72;
    _discoverStatus = 'Researched ' + _discoverEnrichDone + ' of ' + _discoverEnrichTotal + ' agents'; paintProgress();
  });
  if(_discoverTimer){ clearInterval(_discoverTimer); _discoverTimer = null; }
  if(runId !== _discoverRunId) return;
  _discoverProgress=100; paintProgress();
  _discoverRunning=false; _discoverResults=picks;
  _discoverMeta = { place: d.county?(d.county+', '+d.stateCode):d.place, radius:d.radius, count:picks.length, minScore:minScore, requested:count };

    sub: picks.length + ' agent' + (picks.length>1?'s':'') + ' found near ' + (d.county||d.place) + (enriched<picks.length?(' \u00b7 ' + enriched + ' fully researched'):''),

function sortDiscover(arr){
  var by = (state.discover && state.discover.sortBy) || 'match';
  var copy = arr.slice();
  function tierRank(t){ return t==='A'?0:t==='B'?1:t==='C'?2:3; }
  if(by==='match') copy.sort(function(a,b){ return (b.match_score||0)-(a.match_score||0); });
  else if(by==='tier') copy.sort(function(a,b){ return tierRank(a.tier)-tierRank(b.tier); });
  else if(by==='distance') copy.sort(function(a,b){ return (a.distance_miles==null?99999:a.distance_miles)-(b.distance_miles==null?99999:b.distance_miles); });
  else if(by==='name') copy.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  return copy;
}

  if(r._enriched && r.dossier){
    var full = e('div','disc-full'); full.style.display = _discoverExpanded[r._id]?'block':'none';
    var built=false;
    function buildFull(){ if(built) return; built=true; full.appendChild(discDossierFull(r.dossier)); }
    if(_discoverExpanded[r._id]) buildFull();
    var toggle = e('button',{class:'disc-expand', onclick:function(){
      _discoverExpanded[r._id]=!_discoverExpanded[r._id];
      if(_discoverExpanded[r._id]){ buildFull(); full.style.display='block'; toggle.textContent='Hide full research \u25B4'; }
      else { full.style.display='none'; toggle.textContent='See full research \u25BE'; }
    }}, _discoverExpanded[r._id]?'Hide full research \u25B4':'See full research \u25BE');
    card.appendChild(toggle); card.appendChild(full);
  }
  var soc = r.social || {};
  var links = e('div','disc-links',
    soc.instagram?e('a',{href:(soc.instagram.indexOf('http')===0?soc.instagram:('https://instagram.com/'+soc.instagram.replace(/^@/,''))), target:'_blank', rel:'noopener', title:'Instagram'},'\u25C9'):null,
    soc.linkedin?e('a',{href:(soc.linkedin.indexOf('http')===0?soc.linkedin:('https://'+soc.linkedin)), target:'_blank', rel:'noopener', title:'LinkedIn'},'in'):null,
    soc.website?e('a',{href:(soc.website.indexOf('http')===0?soc.website:('https://'+soc.website)), target:'_blank', rel:'noopener', title:'Website'},'\u2197'):null,
  );
  var existing = discoverInPipeline(r);
  card.appendChild(e('div','disc-card-foot', links, existing ? e('span','disc-inpipe','\u2713 In your pipeline') : e('button',{class:'btn btn-primary btn-sm', onclick:function(){ addDiscoveredAgent(r); }}, 'Add to pipeline')));
  return card;
}


function renderViewContent(){
  switch(state.view){
    case 'pipeline': return renderPipeline();
    case 'discover': return renderDiscover();
    case 'agent':    return renderAgentDetail();
    case 'agents':   return renderAgents();
    case 'playbook': return renderPlaybook();
    case 'nudges':   return renderNudges();
    case 'settings': return renderSettings();
    default:         return renderPipeline();
  }
}

function render(){
  const root = document.getElementById('app');
  if(!state.customCadences) state.customCadences = {};

  // Full-screen takeovers replace everything and reset the shell
  if(auth.mode === 'firebase' && !auth.user){ root.innerHTML=''; _shell=null; _lastViewKey=null; root.appendChild(renderAuthGate()); return; }
  if(!state.onboarded){ root.innerHTML=''; _shell=null; _lastViewKey=null; root.appendChild(renderOnboarding()); return; }
  if(state.viewingDeliverable){
    const viewer = renderDeliverableViewer();
    if(viewer){ root.innerHTML=''; _shell=null; _lastViewKey=null; root.appendChild(viewer); return; }
    state.viewingDeliverable = null;
  }
  if(state.matchRun){
    const overlay = renderMatchOverlay();
    if(overlay){ root.innerHTML=''; _shell=null; _lastViewKey=null; root.appendChild(overlay); return; }
  }

  // Persistent app shell — the topbar (and its radar-logo) is built ONCE and
  // never rebuilt on navigation, so its animation no longer restarts.
  if(!_shell || !root.contains(_shell.topbar)){
    root.innerHTML='';
    const topbar = renderTopbar();
    const main = e('div','main');
    root.appendChild(topbar);
    root.appendChild(main);
    _shell = { topbar, main };
    _lastViewKey = null;
  } else {
    updateTopbar(_shell.topbar);
  }

  const content = renderViewContent();
  const key = state.view + '|' + (state.activeAgentId || '') + '|' + (state.view === 'agent' ? (state.activeTab || '') : '');
  const animate = key !== _lastViewKey;
  if(animate) content.classList.add('view-enter');
  _shell.main.innerHTML='';
  _shell.main.appendChild(content);
  if(animate){
    requestAnimationFrame(() => { content.classList.add('view-in'); });
    _lastViewKey = key;
  }
}

/* ========== INIT ========== */
async function init(){
  // Local mode: simple boot
  if(!FIREBASE_ENABLED){
    auth.mode = 'local';
    auth.ready = true;
    const loaded = await load();
    if(!loaded){ state.onboarded = false; }
    render();
    bootCommon();
    return;
  }

  // Firebase mode: wait for SDK to be ready, then handle auth state
  // Render immediately so the screen is NEVER blank while the SDK downloads.
  try { render(); } catch(e){ console.error('Initial render failed', e); }

  let _started = false;
  const start = () => {
    if(_started) return; _started = true;
    if(!fbInit()){
      // SDK failed to load — fall back to local mode but warn
      auth.mode = 'local';
      auth.ready = true;
      console.warn('Firebase SDK unavailable — running in local mode');
      load().then(loaded => { if(!loaded) state.onboarded = false; render(); bootCommon(); });
      return;
    }

    // Email/password: the session is restored automatically (Firebase persists
    // it locally). onAuthStateChanged fires with the current user, or null.
    window.RR_FB.onAuthStateChanged(_fbAuth, async (user) => {
      if(user){
        // Validate domain
        if(ALLOWED_EMAIL_DOMAIN && user.email && !user.email.toLowerCase().endsWith(ALLOWED_EMAIL_DOMAIN.toLowerCase())){
          toast('That email isn\u2019t authorized for Realtor Radar','error');
          await fbSignOut();
          auth.user = null;
          render();
          return;
        }
        auth.user = user;
        // Load user's data + templates
        try {
          await loadTemplates();
          const loaded = await load();
          if(!state.loSettings.email && user.email) state.loSettings.email = user.email;
          if(!loaded){ state.onboarded = false; }
        } catch(e){ console.error('Data load failed', e); }
        render();
      } else {
        auth.user = null;
        render();
      }
    });
  };

  if(window.RR_FB){ start(); }
  else { window.addEventListener('rr-fb-ready', start, { once:true }); }

  // Safety net: if the SDK never loads (offline, blocked, CDN issue), never hang
  // on a blank screen — fall back to local mode after a short wait.
  setTimeout(() => {
    if(!_started && !window.RR_FB){
      console.warn('Firebase SDK did not load in time — falling back to local mode');
      _started = true;
      auth.mode = 'local';
      auth.ready = true;
      load().then(loaded => { if(!loaded) state.onboarded = false; render(); bootCommon(); });
    }
  }, 4000);

  bootCommon();
}

function bootCommon(){
  // Keyboard shortcut: Esc closes modal
  document.addEventListener('keydown', ev => {
    if(ev.key === 'Escape'){
      const modal = document.querySelector('.modal-shade');
      if(modal) closeModal();
    }
    if((ev.metaKey || ev.ctrlKey) && ev.key === 'k'){
      ev.preventDefault();
      if(state.view === 'pipeline') openAddAgentModal();
    }
  });

  // Console banner
  console.log('%cRealtor Radar v' + VERSION,
    'font-family:Lora,serif;font-size:18px;font-weight:600;color:#00818D;font-style:italic');
  console.log('%cMode: ' + auth.mode + (FIREBASE_ENABLED ? ' · Firebase' : ' · localStorage'),
    'font-family:monospace;font-size:11px;color:#6b6b6b');
}

// Boot
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

</script>
